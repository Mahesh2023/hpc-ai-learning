services:
  # ── Backend API ──
  backend:
    build: ./backend
    container_name: hpcai-backend
    volumes:
      - hpcai-data:/app/data
      - ./backend/app/curriculum:/app/app/curriculum:ro
    environment:
      - HPCAI_SECRET_KEY=${HPCAI_SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      - HPCAI_DATABASE_URL=sqlite:////app/data/hpcai.db
      - HPCAI_CORS_ORIGINS=http://localhost,http://localhost:3000,http://localhost:${PORT:-80}
      - HPCAI_SANDBOX_ENABLED=${HPCAI_SANDBOX_ENABLED:-true}
      - HPCAI_TERMINAL_ENABLED=${HPCAI_TERMINAL_ENABLED:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend + Nginx reverse proxy ──
  frontend:
    build: ./frontend
    container_name: hpcai-frontend
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hpcai-data:
