        hyperparameters:
          learning_rate: 2e-5
          batch_size: 32
          epochs: 3
      performance:
        accuracy: 0.934
        f1_score: 0.921
        latency_p50: 12ms
        latency_p99: 45ms
      limitations:
        - "Trained only on English text"
        - "May underperform on reviews shorter than 10 words"
        - "Not evaluated for sarcasm detection"
      ethical_considerations:
