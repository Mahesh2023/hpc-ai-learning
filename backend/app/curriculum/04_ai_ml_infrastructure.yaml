        hints:
          - "Use dist.init_process_group(backend, rank=rank, world_size=world_size)."
          - "Set the CUDA device with torch.cuda.set_device(rank)."
          - "is_main_process should be True only for rank 0."
        solution: |
          ```python
          import torch
          import torch.distributed as dist

          def setup_ddp(rank, world_size, backend="nccl"):
              dist.init_process_group(backend, rank=rank, world_size=world_size)
              if backend == "nccl":
                  torch.cuda.set_device(rank)
                  device = f"cuda:{rank}"
              else:
                  device = "cpu"
              return {
                  "rank": rank,
                  "world_size": world_size,
                  "device": device,
                  "is_main_process": rank == 0,
              }
          ```

