        solution: "The correct order is: COPY requirements → pip install → COPY code → COPY models. Docker's layer cache is invalidated sequentially: when a layer changes, all subsequent layers are rebuilt. By placing requirements.txt (which changes infrequently) before source code (which changes every commit), we avoid re-running pip install on every code change, saving minutes of build time. Model weights change per experiment, so they go last."

      # ---- Exercise 3: Coding — PyTorch GPU Verification ----
      - id: "aiml-framework-code1"
