          - "Build the path as f'{checkpoint_dir}/ckpt-epoch{epoch}-step{step}.pt'."
          - "Append to self.checkpoints and then trim to max_keep."
          - "get_latest returns self.checkpoints[-1] if non-empty, else None."
        solution: |
          ```python
          class CheckpointManager:
              def __init__(self, checkpoint_dir="/checkpoints", max_keep=3):
                  self.checkpoint_dir = checkpoint_dir
                  self.max_keep = max_keep
                  self.checkpoints = []

              def save(self, epoch, step, metrics):
                  path = f"{self.checkpoint_dir}/ckpt-epoch{epoch}-step{step}.pt"
                  ckpt = {
                      "epoch": epoch,
                      "step": step,
                      "metrics": metrics,
                      "path": path,
                  }
                  self.checkpoints.append(ckpt)
                  while len(self.checkpoints) > self.max_keep:
                      self.checkpoints.pop(0)
                  return path

              def get_latest(self):
                  return self.checkpoints[-1] if self.checkpoints else None
          ```

