          def split_traffic(total_requests, model_weights):
              """
              Split traffic across model versions using largest-remainder method.

              Args:
                  total_requests: Total number of requests to distribute.
                  model_weights: Dict of model_version -> weight (0.0 to 1.0).
                                 Weights must sum to 1.0.

              Returns:
                  Dict of model_version -> request count (ints summing to total).
              """
