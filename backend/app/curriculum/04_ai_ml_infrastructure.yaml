        solution: "When you run `dvc add`, DVC: (1) computes an MD5 hash of the file, (2) copies/moves the file to .dvc/cache/ organized by hash, (3) creates a .dvc pointer file (e.g., training_data.parquet.dvc) containing the hash and file metadata, and (4) adds the original file to .gitignore. Git tracks only the small .dvc file, while the actual data lives in DVC's cache. Running `dvc push` uploads the cached data to a configured remote (S3, GCS, etc.)."

      # ---- Exercise 3: Coding — MLflow Experiment Logger ----
      - id: "aiml-registry-code1"
        title: "Experiment Tracking Helper"
        description: "Write a class `ExperimentLogger` with methods `log_params(params_dict)`, `log_metrics(metrics_dict, step)`, and `get_best_metric(metric_name)`. The class should store all logged parameters and metrics internally. `get_best_metric` should return the maximum value seen for the given metric name across all steps, or None if the metric was never logged."
        exercise_type: "coding"
        difficulty: 2
        starter_code: |
          class ExperimentLogger:
              """Track ML experiment parameters and metrics."""

              def __init__(self, experiment_name, run_name):
