        test_cases:
          - input: |
              r = split_traffic(100, {"v1": 0.9, "v2": 0.1})
              print(r["v1"], r["v2"])
            expected_output: "90 10"
          - input: |
              r = split_traffic(10, {"v1": 0.7, "v2": 0.3})
              print(r["v1"], r["v2"])
            expected_output: "7 3"
          - input: |
              r = split_traffic(100, {"v1": 0.333, "v2": 0.333, "v3": 0.334})
              print(sum(r.values()))
            expected_output: "100"
          - input: |
              r = split_traffic(10, {"v1": 0.333, "v2": 0.333, "v3": 0.334})
              print(r["v3"])
            expected_output: "4"
          - input: |
              r = split_traffic(1000, {"a": 0.5, "b": 0.5})
              print(r["a"], r["b"])
            expected_output: "500 500"
        hints:
          - "Largest-remainder: compute fractional shares, take the floor, then distribute leftover to versions with largest fractional remainders."
          - "fractional = total * weight; floor_count = int(fractional); remainder = fractional - floor_count"
          - "Sort by remainder descending, give +1 to the top versions until the total is reached."
        solution: |
          ```python
          def split_traffic(total_requests, model_weights):
              shares = {}
              for model, weight in model_weights.items():
                  exact = total_requests * weight
                  shares[model] = {
                      "floor": int(exact),
                      "remainder": exact - int(exact),
                  }

              allocated = sum(s["floor"] for s in shares.values())
              leftover = total_requests - allocated

              # Sort by remainder descending to allocate leftover
              sorted_models = sorted(
                  shares.keys(),
                  key=lambda m: shares[m]["remainder"],
                  reverse=True,
              )

              result = {m: shares[m]["floor"] for m in shares}
              for i in range(leftover):
                  result[sorted_models[i]] += 1
              return result
          ```
