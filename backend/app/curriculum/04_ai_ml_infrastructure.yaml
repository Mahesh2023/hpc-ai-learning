      # ---- Exercise 2: Quiz — DataLoader Configuration ----
      - id: "aiml-data-q2"
        title: "DataLoader Optimization"
        description: "Which PyTorch DataLoader parameter enables page-locked memory allocation to speed up CPU-to-GPU data transfers via DMA?"
        exercise_type: "quiz"
        difficulty: 2
        options:
          - "num_workers"
          - "pin_memory"
          - "prefetch_factor"
          - "persistent_workers"
        correct_answer: "pin_memory"
        hints:
          - "DMA (Direct Memory Access) requires the source memory to be non-swappable."
          - "Page-locked (pinned) memory cannot be swapped to disk by the OS."
        solution: "pin_memory=True allocates batch tensors in page-locked (pinned) CPU memory. This enables the GPU's DMA engine to transfer data directly without involving the CPU, and it's required for non_blocking=True transfers. Without pinned memory, the CUDA runtime must first copy data to a pinned staging buffer before DMA transfer, adding an extra copy. On HPC systems with fast GPUs, this can improve DataLoader throughput by 2-3×."

