          Common labels.
          */}}
          {{- define "ml-platform.labels" -}}
          helm.sh/chart: {{ include "ml-platform.chart" . }}
          {{ include "ml-platform.selectorLabels" . }}
          app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
          app.kubernetes.io/managed-by: {{ .Release.Service }}
          {{- end }}

          {{/*
          Selector labels.
          */}}
          {{- define "ml-platform.selectorLabels" -}}
          app.kubernetes.io/name: {{ include "ml-platform.name" . }}
          app.kubernetes.io/instance: {{ .Release.Name }}
          {{- end }}

          {{/*
          GPU resources — conditionally include GPU limits.
          */}}
          {{- define "ml-platform.gpuResources" -}}
          requests:
            cpu: {{ .Values.resources.requests.cpu | quote }}
            memory: {{ .Values.resources.requests.memory | quote }}
          limits:
            cpu: {{ .Values.resources.limits.cpu | quote }}
            memory: {{ .Values.resources.limits.memory | quote }}
            {{- if .Values.gpu.enabled }}
            nvidia.com/gpu: {{ .Values.gpu.count }}
            {{- end }}
          {{- end }}
          ```

      - id: "helm-ex3"
        title: "Deploy JupyterHub with Custom Values"
        description: |
          Write a JupyterHub Helm values file that configures: (1) a LoadBalancer
          proxy service; (2) two singleuser profiles — "GPU Data Science" with 1 GPU
          and the pytorch-notebook image, and "CPU Data Science" (default) with the
          datascience-notebook image; (3) 50Gi persistent storage per user with the
          fast-nvme StorageClass; (4) admin users list. Then show the helm install
          command.
        exercise_type: "coding"
        difficulty: 3
        starter_code: |
          # jupyterhub-values.yaml

          # TODO: Proxy service configuration (LoadBalancer)

          # TODO: Single user configuration
          #   - Profile list with GPU and CPU options
          #   - GPU profile: pytorch-notebook with cuda12, 1 GPU, 4 CPU, 16Gi
          #   - CPU profile: datascience-notebook (default)

          # TODO: User storage (50Gi, fast-nvme StorageClass)

          # TODO: Hub configuration with admin users

          # ---
          # TODO: Helm install command (as a comment)
        test_cases:
          - input: "Check proxy type"
            expected_output: "LoadBalancer"
          - input: "Check GPU profile"
            expected_output: "nvidia.com/gpu"
          - input: "Check storage"
            expected_output: "50Gi"
          - input: "Check storage class"
            expected_output: "fast-nvme"
        hints:
          - "Use singleuser.profileList for multiple environment options."
          - "GPU resources go under kubespawner_override.extra_resource_limits."
          - "Storage is configured under singleuser.storage."
        solution: |
          ```yaml
          # jupyterhub-values.yaml
          proxy:
            service:
              type: LoadBalancer

          singleuser:
            profileList:
              - display_name: "GPU Data Science"
                description: "PyTorch + CUDA with 1 NVIDIA GPU"
                kubespawner_override:
                  image: quay.io/jupyter/pytorch-notebook:cuda12-latest
                  extra_resource_limits:
                    nvidia.com/gpu: "1"
                  extra_resource_guarantees:
                    cpu: "4"
                    memory: "16Gi"
              - display_name: "CPU Data Science"
                description: "Standard data science environment"
                default: true
                kubespawner_override:
                  image: quay.io/jupyter/datascience-notebook:latest
                  extra_resource_guarantees:
                    cpu: "2"
                    memory: "8Gi"
            storage:
              capacity: 50Gi
              storageClass: fast-nvme

          hub:
            config:
              Authenticator:
                admin_users:
                  - admin
                  - ml-lead

          # Install command:
          # helm install jhub jupyterhub/jupyterhub \
          #   --namespace jupyter --create-namespace \
          #   --values jupyterhub-values.yaml
          ```

      - id: "helm-ex4"
        title: "Helmfile for ML Platform Stack"
        description: |
          Write a Helmfile that deploys a complete ML platform with four releases:
          (1) NVIDIA GPU Operator from nvidia repo; (2) Prometheus monitoring stack
          from prometheus-community; (3) JupyterHub from jupyterhub repo (depends on
          GPU operator); (4) MLflow from community-charts. Each release should
          reference its own values file and specify the correct namespace.
        exercise_type: "coding"
        difficulty: 3
        starter_code: |
          # helmfile.yaml — ML Platform Stack

          # TODO: Define Helm repositories
          #   nvidia, jupyterhub, prometheus-community, community-charts

          # TODO: Define releases
          #   1. gpu-operator (namespace: gpu-operator)
          #   2. prometheus (namespace: monitoring)
          #   3. jupyterhub (namespace: jupyter, depends on gpu-operator)
          #   4. mlflow (namespace: mlflow)
        test_cases:
          - input: "Check repositories"
            expected_output: "repositories:"
          - input: "Check GPU operator release"
            expected_output: "gpu-operator"
          - input: "Check JupyterHub release"
            expected_output: "jupyterhub"
          - input: "Check dependency"
            expected_output: "needs:"
        hints:
          - "Use 'needs:' to declare dependencies between releases."
          - "Each release needs: name, namespace, chart, version, and values."
          - "Repository URLs: nvidia=https://helm.ngc.nvidia.com/nvidia"
        solution: |
          ```yaml
          repositories:
            - name: nvidia
              url: https://helm.ngc.nvidia.com/nvidia
            - name: jupyterhub
              url: https://hub.jupyter.org/helm-chart/
            - name: prometheus-community
              url: https://prometheus-community.github.io/helm-charts
            - name: community-charts
              url: https://community-charts.github.io/helm-charts

          releases:
            - name: gpu-operator
              namespace: gpu-operator
              chart: nvidia/gpu-operator
              version: "24.3.0"
              values:
                - values/gpu-operator-values.yaml

            - name: prometheus
              namespace: monitoring
              chart: prometheus-community/kube-prometheus-stack
              version: "58.7.2"
              values:
                - values/prometheus-values.yaml

            - name: jupyterhub
              namespace: jupyter
              chart: jupyterhub/jupyterhub
              version: "3.3.7"
              values:
                - values/jupyterhub-values.yaml
              needs:
                - gpu-operator/gpu-operator

            - name: mlflow
              namespace: mlflow
              chart: community-charts/mlflow
              version: "0.10.0"
              values:
                - values/mlflow-values.yaml
          ```

      - id: "helm-ex5"
        title: "HPC Batch Job Helm Chart Template"
        description: |
          Write a Helm template (templates/job.yaml) for an HPC batch job chart.
          The template should create a Kubernetes Job with configurable completions,
          parallelism, backoff limit, and TTL. Include GPU resources (conditional on
          .Values.gpu.enabled), PVC volume mounts, node selector, and tolerations.
          Use proper helper template references for names and labels.
        exercise_type: "coding"
        difficulty: 4
        starter_code: |
          # templates/job.yaml — HPC Batch Job Template

          # TODO: Create a Job manifest using Helm templating
          #   - Use helper templates for name and labels
          #   - Configure completions, parallelism, backoffLimit from Values
          #   - Include TTL seconds after finished
          #   - Add nodeSelector and tolerations (with 'with' blocks)
          #   - Conditionally include GPU resources
          #   - Conditionally mount PVC volumes
        test_cases:
          - input: "Check Job kind"
            expected_output: "kind: Job"
          - input: "Check template reference"
            expected_output: "include"
          - input: "Check completions"
            expected_output: ".Values.job.completions"
          - input: "Check GPU conditional"
            expected_output: "gpu.enabled"
        hints:
          - "Use {{ include \"chart.fullname\" . }} for the job name."
          - "Use {{- with .Values.nodeSelector }} for optional sections."
          - "Use {{- if .Values.gpu.enabled }} to conditionally add GPU limits."
        solution: |
          ```yaml
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: {{ include "hpc-job.fullname" . }}-{{ .Release.Revision }}
            labels:
              {{- include "hpc-job.labels" . | nindent 4 }}
          spec:
            completions: {{ .Values.job.completions }}
            parallelism: {{ .Values.job.parallelism }}
            backoffLimit: {{ .Values.job.backoffLimit | default 3 }}
            ttlSecondsAfterFinished: {{ .Values.job.ttlSeconds | default 3600 }}
            template:
              metadata:
                labels:
                  {{- include "hpc-job.selectorLabels" . | nindent 8 }}
              spec:
                restartPolicy: Never
                {{- with .Values.nodeSelector }}
                nodeSelector:
                  {{- toYaml . | nindent 10 }}
                {{- end }}
                {{- with .Values.tolerations }}
                tolerations:
                  {{- toYaml . | nindent 10 }}
                {{- end }}
                containers:
                  - name: hpc-worker
                    image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
                    {{- with .Values.job.command }}
                    command:
                      {{- toYaml . | nindent 16 }}
                    {{- end }}
                    resources:
                      requests:
                        cpu: {{ .Values.resources.requests.cpu | quote }}
                        memory: {{ .Values.resources.requests.memory | quote }}
                      limits:
                        cpu: {{ .Values.resources.limits.cpu | quote }}
                        memory: {{ .Values.resources.limits.memory | quote }}
                        {{- if .Values.gpu.enabled }}
                        nvidia.com/gpu: {{ .Values.gpu.count }}
                        {{- end }}
                    {{- if .Values.volumes.data.enabled }}
                    volumeMounts:
                      - name: data
                        mountPath: {{ .Values.volumes.data.mountPath }}
                        readOnly: {{ .Values.volumes.data.readOnly | default false }}
                    {{- end }}
                {{- if .Values.volumes.data.enabled }}
                volumes:
                  - name: data
                    persistentVolumeClaim:
                      claimName: {{ .Values.volumes.data.pvcName }}
                {{- end }}
          ```
