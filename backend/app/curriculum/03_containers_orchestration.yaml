      - id: "k8s-gpu-ex2"
        title: "MIG Configuration for Mixed Workloads"
        description: |
          Write a MIG Manager ConfigMap that configures an A100 80GB node with a
          mixed partitioning strategy: GPUs 0-3 each get 1× 3g.40gb and 4× 1g.10gb
          MIG slices (for a mix of training and inference), and GPUs 4-7 remain
          as full GPUs (MIG disabled) for large training jobs. Use the A100 device
          filter 0x20B210DE.
        exercise_type: "coding"
        difficulty: 4
        starter_code: |
          # mig-config.yaml — Mixed MIG Configuration
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: mig-parted-config
            namespace: gpu-operator
          data:
            config.yaml: |
              version: v1
              mig-configs:
                # TODO: Define 'mixed-workload' config
                #   GPUs 0-3: MIG enabled
                #     - 1× 3g.40gb slice (for medium training)
                #     - 4× 1g.10gb slices (for inference)
                #   GPUs 4-7: MIG disabled (full GPUs for large training)
                #   Use device-filter: ["0x20B210DE"] for A100
