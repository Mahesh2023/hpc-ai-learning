  # ===========================================================================
  # LESSON 3 — Kubernetes Core Concepts
  # ===========================================================================
  - id: "kubernetes-core"
    title: "Kubernetes Core Concepts"
    order: 3
    objectives:
      - "Describe Kubernetes control plane and worker node architecture"
      - "Create and manage Pods, Deployments, and Services"
      - "Configure resource requests and limits for CPU and memory"
      - "Set up Namespaces and RBAC for multi-tenant HPC environments"
      - "Provision Persistent Volumes and StorageClasses for HPC storage"
      - "Apply Network Policies for cluster security"
    content_md: |
      # Kubernetes Core Concepts

      ## 1. Architecture Overview

      Kubernetes (K8s) is a container orchestration platform that automates
      deployment, scaling, and management of containerized workloads.

      ```
      ┌──────────────────── Control Plane ─────────────────────┐
      │                                                         │
      │  ┌──────────────┐  ┌─────────────┐  ┌──────────────┐  │
      │  │  API Server   │  │  Scheduler  │  │     etcd     │  │
      │  │  (kube-api)   │  │             │  │ (key-value   │  │
      │  │  REST gateway │  │ Assigns pods│  │  store)      │  │
      │  │  for all ops  │  │ to nodes    │  │              │  │
      │  └──────┬───────┘  └──────┬──────┘  └──────────────┘  │
      │         │                  │                            │
      │  ┌──────┴──────────────────┴───────────────────────┐   │
      │  │          Controller Manager                      │   │
      │  │  Deployment, ReplicaSet, Job, DaemonSet, etc.   │   │
      │  │  Reconciles desired state vs actual state        │   │
      │  └─────────────────────────────────────────────────┘   │
      └───────────────────────┬─────────────────────────────────┘
                              │ kubelet API
        ┌─────────────────────┼──────────────────────────────┐
        │    Worker Node 1    │                              │
        │  ┌─────────┐  ┌────┴─────┐  ┌──────────────────┐  │
        │  │ kubelet  │  │kube-proxy│  │ Container Runtime │  │
        │  │ (agent)  │  │(network) │  │ (containerd)     │  │
        │  └─────────┘  └──────────┘  └──────────────────┘  │
        │  ┌───────┐ ┌───────┐ ┌───────┐                    │
        │  │ Pod A │ │ Pod B │ │ Pod C │                    │
        │  └───────┘ └───────┘ └───────┘                    │
        └────────────────────────────────────────────────────┘
      ```

      ### 1.1 Control Plane Components

      | Component              | Role                                          |
      |------------------------|-----------------------------------------------|
      | **API Server**         | Central hub; all communication goes through it |
      | **etcd**               | Distributed key-value store for cluster state  |
      | **Scheduler**          | Assigns Pods to nodes based on resources/constraints |
      | **Controller Manager** | Runs controllers that reconcile desired state  |

      ### 1.2 Worker Node Components

      | Component              | Role                                         |
      |------------------------|----------------------------------------------|
      | **kubelet**            | Agent on each node; manages Pod lifecycle    |
      | **kube-proxy**         | Maintains network rules for Service routing  |
      | **Container Runtime**  | Runs containers (containerd, CRI-O)          |

      :::interactive{component="ProcessSchedulerViz"}

      ## 2. Pods

      A **Pod** is the smallest deployable unit — one or more containers
      that share the same network namespace, storage volumes, and lifecycle.

      ```yaml
      apiVersion: v1
      kind: Pod
      metadata:
        name: ml-inference
        namespace: ml-serving
        labels:
          app: inference
          team: ml-platform
      spec:
        containers:
          - name: model-server
            image: nvcr.io/nvidia/tritonserver:24.01-py3
            ports:
              - containerPort: 8000
                name: http
              - containerPort: 8001
                name: grpc
            resources:
              requests:
                cpu: "4"
                memory: "16Gi"
              limits:
                cpu: "8"
                memory: "32Gi"
                nvidia.com/gpu: 1
            volumeMounts:
              - name: model-repo
                mountPath: /models
                readOnly: true
            readinessProbe:
              httpGet:
                path: /v2/health/ready
                port: 8000
              initialDelaySeconds: 30
              periodSeconds: 10
            livenessProbe:
              httpGet:
                path: /v2/health/live
                port: 8000
              initialDelaySeconds: 60
              periodSeconds: 30
        volumes:
          - name: model-repo
            persistentVolumeClaim:
              claimName: model-store-pvc
        restartPolicy: Always
      ```

      ### 2.1 Resource Requests vs Limits

      | Field      | Meaning                                              |
      |------------|------------------------------------------------------|
      | `requests` | Minimum guaranteed resources; used for **scheduling** |
      | `limits`   | Maximum allowed; enforced by **cgroups** at runtime   |

      ```
      requests ≤ actual usage ≤ limits

      ┌────────────────────────────────────────────┐
      │  Node capacity: 64 CPUs, 256 Gi memory     │
      │                                              │
      │  Pod A requests: 4 CPU, 16 Gi  ──┐          │
      │  Pod B requests: 8 CPU, 32 Gi  ──┼─ total   │
      │  Pod C requests: 4 CPU, 16 Gi  ──┘ scheduled │
      │                                              │
      │  Remaining allocatable: 48 CPU, 192 Gi      │
      └────────────────────────────────────────────┘
      ```

      **Best practice for HPC/ML**: Set requests = limits for GPU workloads
      to get **Guaranteed** QoS class, preventing eviction.

      ## 3. Deployments

      A **Deployment** manages a ReplicaSet and provides declarative
      updates with rollback support:

      ```yaml
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: inference-api
        namespace: ml-serving
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: inference-api
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
        template:
          metadata:
            labels:
              app: inference-api
              version: v2.1.0
          spec:
            containers:
              - name: api
                image: myregistry/inference-api:v2.1.0
                ports:
                  - containerPort: 8080
                resources:
                  requests:
                    cpu: "2"
                    memory: "8Gi"
                  limits:
                    cpu: "4"
                    memory: "16Gi"
                    nvidia.com/gpu: 1
                env:
                  - name: MODEL_NAME
                    value: "bert-base-uncased"
                  - name: MAX_BATCH_SIZE
                    valueFrom:
                      configMapKeyRef:
                        name: inference-config
                        key: max_batch_size
      ```

      Key operations:

      ```bash
      kubectl apply -f deployment.yaml
      kubectl rollout status deployment/inference-api
      kubectl rollout history deployment/inference-api
      kubectl rollout undo deployment/inference-api --to-revision=2
      kubectl scale deployment/inference-api --replicas=5
      ```

      ## 4. Services

      Services provide stable networking endpoints for dynamic sets of Pods:

      | Type           | Scope              | Use Case                      |
      |----------------|--------------------|-------------------------------|
      | **ClusterIP**  | Cluster-internal   | Internal microservices        |
      | **NodePort**   | Node IP + port     | Development / testing         |
      | **LoadBalancer** | Cloud LB         | Production external access    |
      | **ExternalName** | DNS CNAME        | External service aliasing     |

      ```yaml
      apiVersion: v1
      kind: Service
      metadata:
        name: inference-api-svc
        namespace: ml-serving
      spec:
        type: ClusterIP
        selector:
          app: inference-api
        ports:
          - name: http
            port: 80
            targetPort: 8080
          - name: grpc
            port: 8001
            targetPort: 8001
      ```

      DNS resolution: `inference-api-svc.ml-serving.svc.cluster.local`

      ## 5. ConfigMaps and Secrets

      ### 5.1 ConfigMaps

      ```yaml
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: training-config
        namespace: ml-training
      data:
        BATCH_SIZE: "64"
        LEARNING_RATE: "0.001"
        NUM_EPOCHS: "100"
        config.yaml: |
          model:
            name: bert-base
            hidden_size: 768
          training:
            warmup_steps: 1000
            weight_decay: 0.01
      ```

      ### 5.2 Secrets

      ```yaml
      apiVersion: v1
      kind: Secret
      metadata:
        name: registry-creds
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: <base64-encoded-docker-config>
      ---
      apiVersion: v1
      kind: Secret
      metadata:
        name: s3-credentials
      type: Opaque
      stringData:
        AWS_ACCESS_KEY_ID: "AKIAIOSFODNN7EXAMPLE"
        AWS_SECRET_ACCESS_KEY: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
      ```

      Reference in pods:

      ```yaml
      spec:
        containers:
          - name: app
            envFrom:
              - configMapRef:
                  name: training-config
              - secretRef:
                  name: s3-credentials
            volumeMounts:
              - name: config-vol
                mountPath: /etc/config
        volumes:
          - name: config-vol
            configMap:
              name: training-config
              items:
                - key: config.yaml
                  path: config.yaml
      ```

      ## 6. Namespaces and RBAC

      ### 6.1 Namespaces for Multi-Tenancy

      ```bash
      kubectl create namespace ml-training
      kubectl create namespace ml-serving
      kubectl create namespace data-engineering
      ```

      ### 6.2 ResourceQuotas

      ```yaml
      apiVersion: v1
      kind: ResourceQuota
      metadata:
        name: ml-training-quota
        namespace: ml-training
      spec:
        hard:
          requests.cpu: "128"
          requests.memory: "512Gi"
          requests.nvidia.com/gpu: "16"
          limits.cpu: "128"
          limits.memory: "512Gi"
          limits.nvidia.com/gpu: "16"
          pods: "50"
          persistentvolumeclaims: "20"
      ```

      ### 6.3 RBAC (Role-Based Access Control)

      ```yaml
      # Role — scoped to a namespace
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: ml-developer
        namespace: ml-training
      rules:
        - apiGroups: [""]
          resources: ["pods", "pods/log", "pods/exec", "services", "configmaps"]
          verbs: ["get", "list", "watch", "create", "update", "delete"]
        - apiGroups: ["apps"]
          resources: ["deployments"]
          verbs: ["get", "list", "watch", "create", "update"]
        - apiGroups: ["batch"]
          resources: ["jobs", "cronjobs"]
          verbs: ["get", "list", "watch", "create", "delete"]
      ---
      # RoleBinding — binds role to a user/group
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: ml-developer-binding
        namespace: ml-training
      subjects:
        - kind: Group
          name: ml-team
          apiGroup: rbac.authorization.k8s.io
      roleRef:
        kind: Role
        name: ml-developer
        apiGroup: rbac.authorization.k8s.io
      ```

      ## 7. Persistent Volumes and StorageClasses

      ### 7.1 StorageClass

      ```yaml
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: fast-nvme
      provisioner: kubernetes.io/aws-ebs
      parameters:
        type: io2
        iopsPerGB: "50"
      reclaimPolicy: Retain
      volumeBindingMode: WaitForFirstConsumer
      allowVolumeExpansion: true
      ```

      ### 7.2 PersistentVolumeClaim (PVC)

      ```yaml
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: training-data-pvc
        namespace: ml-training
      spec:
        accessModes:
          - ReadWriteMany          # Required for multi-node access
        storageClassName: fast-nvme
        resources:
          requests:
            storage: 500Gi
      ```

      ### 7.3 For HPC Shared Filesystems (NFS/Lustre)

      ```yaml
      apiVersion: v1
      kind: PersistentVolume
      metadata:
        name: lustre-shared-data
      spec:
        capacity:
          storage: 10Ti
        accessModes:
          - ReadWriteMany
        nfs:
          server: lustre-gw.hpc.local
          path: /lustre/shared/datasets
        persistentVolumeReclaimPolicy: Retain
      ```

      ## 8. Network Policies

      Restrict traffic between namespaces for security:

      ```yaml
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: deny-all-ingress
        namespace: ml-training
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
        ingress: []
      ---
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-from-serving
        namespace: ml-training
      spec:
        podSelector:
          matchLabels:
            app: model-registry
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    name: ml-serving
            ports:
              - protocol: TCP
                port: 8080
      ```

