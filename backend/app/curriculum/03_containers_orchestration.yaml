  # ---------------------------------------------------------------------------
  - id: "helm-charts-operators"
    title: "Helm Charts & Operators"
    order: 5
    objectives:
      - "Understand Helm's architecture: charts, releases, and repositories"
      - "Create and customize Helm charts with values.yaml"
      - "Use template functions and conditionals in Helm templates"
      - "Describe the Operator pattern for managing complex ML workloads"
    content_md: |
      # Helm Charts & Operators

      ## Why Helm?

      Managing Kubernetes manifests for ML platforms involves dozens of
      interconnected YAML files. **Helm** is the package manager for
      Kubernetes — it bundles manifests into reusable, parameterized
      **charts**.

      ```
      my-ml-platform/
      ├── Chart.yaml          # Chart metadata
      ├── values.yaml         # Default configuration values
      ├── templates/
      │   ├── deployment.yaml
      │   ├── service.yaml
      │   ├── configmap.yaml
      │   ├── ingress.yaml
      │   └── _helpers.tpl    # Named template snippets
      └── charts/             # Sub-chart dependencies
      ```

      ## Creating a Helm Chart

      ```bash
      helm create ml-inference
      ```

      This scaffolds a chart. Let's customize `values.yaml`:

      ```yaml
      # values.yaml
      replicaCount: 3

      image:
        repository: myregistry/triton-server
        tag: "24.01-py3"
        pullPolicy: IfNotPresent

      service:
        type: ClusterIP
        ports:
          http: 8000
          grpc: 8001
          metrics: 8002

      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
        limits:
          cpu: "8"
          memory: "32Gi"
          nvidia.com/gpu: 1

      modelRepository:
        path: /models
        storageType: pvc    # pvc, s3, gcs
        pvcName: model-store

      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 10
        targetGPUUtilization: 70
      ```

      ## Templates with Go Templating

      Helm uses Go's `text/template` engine. Here's `templates/deployment.yaml`:

      ```yaml
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ include "ml-inference.fullname" . }}
        labels:
          {{- include "ml-inference.labels" . | nindent 4 }}
      spec:
        {{- if not .Values.autoscaling.enabled }}
        replicas: {{ .Values.replicaCount }}
        {{- end }}
        selector:
          matchLabels:
            {{- include "ml-inference.selectorLabels" . | nindent 6 }}
        template:
          metadata:
            labels:
              {{- include "ml-inference.selectorLabels" . | nindent 8 }}
          spec:
            containers:
              - name: {{ .Chart.Name }}
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
                ports:
                  - containerPort: {{ .Values.service.ports.http }}
                    name: http
                  - containerPort: {{ .Values.service.ports.grpc }}
                    name: grpc
                resources:
                  {{- toYaml .Values.resources | nindent 12 }}
                volumeMounts:
                  - name: model-store
                    mountPath: {{ .Values.modelRepository.path }}
            volumes:
              - name: model-store
                persistentVolumeClaim:
                  claimName: {{ .Values.modelRepository.pvcName }}
      ```

      ## Installing and Upgrading

      ```bash
      # Install with custom values
      helm install triton ./ml-inference \
        --namespace ml-serving \
        --values production-values.yaml

      # Upgrade with new image tag
      helm upgrade triton ./ml-inference \
        --set image.tag="24.05-py3" \
        --reuse-values

      # Rollback if something goes wrong
      helm rollback triton 1

      # View release history
      helm history triton
      ```

      ## The Operator Pattern

      For stateful or complex workloads (distributed training, model serving
      with auto-scaling), the **Operator pattern** extends Kubernetes with
      **Custom Resource Definitions (CRDs)** and a controller that
      reconciles desired state:

      ```
      User creates CR          Operator Controller
      ┌──────────────┐         ┌─────────────────────┐
      │ TrainingJob   │ ──────→ │ Watch for CR events  │
      │   spec:       │         │ Create Pods, Svcs    │
      │     workers: 4│         │ Monitor health       │
      │     gpus: 8   │         │ Handle failures      │
      │     image: ...│         │ Report status back   │
      └──────────────┘         └─────────────────────┘
      ```

      Popular ML operators:

      | Operator                 | Purpose                        |
      |--------------------------|--------------------------------|
      | Kubeflow Training Op.   | PyTorchJob, TFJob, MPIJob      |
      | NVIDIA GPU Operator     | Auto-install drivers + toolkit |
      | KServe                  | Serverless model inference      |
      | Spark Operator          | Apache Spark on Kubernetes     |

      Example Kubeflow PyTorchJob CRD:

      ```yaml
      apiVersion: kubeflow.org/v1
      kind: PyTorchJob
      metadata:
        name: bert-finetune
      spec:
        pytorchReplicaSpecs:
          Master:
            replicas: 1
            template:
              spec:
                containers:
                  - name: pytorch
                    image: myregistry/bert-train:latest
                    resources:
                      limits:
                        nvidia.com/gpu: 4
          Worker:
            replicas: 3
            template:
              spec:
                containers:
                  - name: pytorch
                    image: myregistry/bert-train:latest
                    resources:
                      limits:
                        nvidia.com/gpu: 4
      ```

      This creates a 4-node distributed training job (1 master + 3 workers),
      each with 4 GPUs — 16 GPUs total. The Training Operator handles
      service discovery, `MASTER_ADDR`/`MASTER_PORT` configuration, and
      automatic cleanup.

    exercises:
      - id: "containers-helm-q1"
        title: "Helm Chart Components"
        description: "Which file in a Helm chart contains the default configuration values that users can override during installation?"
        exercise_type: "quiz"
        difficulty: 1
        options:
          - "Chart.yaml"
          - "values.yaml"
          - "_helpers.tpl"
          - "requirements.yaml"
        correct_answer: "values.yaml"
        hints:
          - "It's the file that defines all the knobs and dials for customizing a chart."
          - "Users override it with --set or --values flags."
        solution: "values.yaml contains the default configuration values for a Helm chart. When users install or upgrade a chart, they can override any value using `--set key=value` or `--values custom-values.yaml`. The template files reference these values with the `.Values` object (e.g., `.Values.replicaCount`). Chart.yaml contains chart metadata, and _helpers.tpl contains reusable template snippets."

      - id: "containers-helm-code1"
        title: "Write a Helm Values File"
        description: "Write a values.yaml for a Helm chart deploying NVIDIA Triton Inference Server. Include settings for: image (nvcr.io/nvidia/tritonserver:24.01-py3), 2 replicas, GPU resource limits (1 GPU), model repository on a PVC named 'model-store', and HTTP/gRPC/metrics ports (8000/8001/8002)."
        exercise_type: "coding"
        difficulty: 2
        hints:
          - "Organize related settings into nested objects (image, resources, service)."
          - "Include both requests and limits for resources."
        solution: |
          ```yaml
          replicaCount: 2

          image:
            repository: nvcr.io/nvidia/tritonserver
            tag: "24.01-py3"
            pullPolicy: IfNotPresent

          service:
            type: ClusterIP
            ports:
              http: 8000
              grpc: 8001
              metrics: 8002

          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: 1

          modelRepository:
            mountPath: /models
            pvcName: model-store

          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          ```

      - id: "containers-helm-lab1"
        title: "Kubeflow PyTorchJob Manifest"
        description: "Write a Kubeflow PyTorchJob custom resource that runs a distributed fine-tuning job with 1 master node and 3 worker nodes. Each node should use the image 'myregistry/llm-finetune:v1.0', request 8 GPUs, 64 CPUs, and 512Gi memory. Include the appropriate environment variables for NCCL."
        exercise_type: "lab"
        difficulty: 4
        hints:
          - "Use apiVersion: kubeflow.org/v1 and kind: PyTorchJob."
          - "Both Master and Worker specs need identical container configs."
          - "NCCL environment variables include NCCL_DEBUG and NCCL_IB_DISABLE."
        solution: |
          ```yaml
          apiVersion: kubeflow.org/v1
          kind: PyTorchJob
          metadata:
            name: llm-finetune
            namespace: ml-training
          spec:
            pytorchReplicaSpecs:
              Master:
                replicas: 1
                template:
                  spec:
                    containers:
                      - name: pytorch
                        image: myregistry/llm-finetune:v1.0
                        command:
                          - torchrun
                          - --nproc_per_node=8
                          - --nnodes=4
                          - train.py
                        env:
                          - name: NCCL_DEBUG
                            value: "INFO"
                          - name: NCCL_IB_DISABLE
                            value: "0"
                          - name: NCCL_SOCKET_IFNAME
                            value: "eth0"
                        resources:
                          limits:
                            cpu: "64"
                            memory: "512Gi"
                            nvidia.com/gpu: 8
              Worker:
                replicas: 3
                template:
                  spec:
                    containers:
                      - name: pytorch
                        image: myregistry/llm-finetune:v1.0
                        command:
                          - torchrun
                          - --nproc_per_node=8
                          - --nnodes=4
                          - train.py
                        env:
                          - name: NCCL_DEBUG
                            value: "INFO"
                          - name: NCCL_IB_DISABLE
                            value: "0"
                          - name: NCCL_SOCKET_IFNAME
                            value: "eth0"
                        resources:
                          limits:
                            cpu: "64"
                            memory: "512Gi"
                            nvidia.com/gpu: 8
          ```
          This creates a 32-GPU training job across 4 nodes.
