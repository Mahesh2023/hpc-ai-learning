        solution: "Unlike traditional software where behavior changes only with code, ML systems have three axes of change: code, data, and model configuration. MLOps extends DevOps to track and automate all three. A data distribution shift can degrade model performance without any code change, requiring continuous monitoring, retraining triggers, and automated evaluation gates that don't exist in traditional DevOps."

      - id: "platform-eng-mlops-code1"
        title: "Kubeflow Training Pipeline"
        description: "Write a Kubeflow Pipelines pipeline with three components: data_preprocess (CPU), train_model (8 GPUs, 128Gi memory), and evaluate_model (1 GPU). The pipeline should pass data between stages using KFP artifacts and only proceed to evaluation if training completes successfully."
        exercise_type: "coding"
        difficulty: 3
        hints:
          - "Use @dsl.component decorator with base_image parameter for each step"
          - "Use Input/Output type annotations with Dataset and Model artifact types"
          - "Set GPU limits with task.set_gpu_limit() after component instantiation"
        solution: |
          from kfp import dsl
          from kfp.dsl import Input, Output, Dataset, Model, Metrics

          @dsl.component(base_image="python:3.11-slim", packages_to_install=["pandas"])
          def data_preprocess(raw_path: str, processed: Output[Dataset]):
              import pandas as pd
              df = pd.read_parquet(raw_path)
              df = df.dropna().reset_index(drop=True)
              df.to_parquet(processed.path)

          @dsl.component(base_image="nvcr.io/nvidia/pytorch:24.01-py3")
          def train_model(data: Input[Dataset], epochs: int, model_out: Output[Model]):
              import torch
              model = build_model()
              train(model, data.path, epochs)
              torch.save(model.state_dict(), model_out.path)

          @dsl.component(base_image="nvcr.io/nvidia/pytorch:24.01-py3")
          def evaluate_model(model: Input[Model], data: Input[Dataset], metrics: Output[Metrics]):
              accuracy = run_evaluation(model.path, data.path)
              metrics.log_metric("accuracy", accuracy)

          @dsl.pipeline(name="training-pipeline")
          def pipeline(raw_data: str, epochs: int = 10):
              prep = data_preprocess(raw_path=raw_data)
              train_task = train_model(data=prep.outputs["processed"], epochs=epochs)
              train_task.set_gpu_limit(8).set_memory_limit("128Gi")
              eval_task = evaluate_model(
                  model=train_task.outputs["model_out"],
                  data=prep.outputs["processed"]
              )
              eval_task.set_gpu_limit(1)

      - id: "platform-eng-mlops-lab1"
        title: "End-to-End MLOps Pipeline with Automated Promotion"
        description: "Build a complete MLOps pipeline that: (1) validates incoming data with schema checks, (2) trains a model with experiment tracking via MLflow, (3) evaluates the model against the current production baseline, (4) automatically promotes the model if it beats the baseline by at least 2%, and (5) triggers a canary deployment at 10% traffic. Write the Kubeflow pipeline definition and an Airflow DAG that schedules daily retraining."
        exercise_type: "lab"
        difficulty: 4
        hints:
          - "Use MLflow's model registry API to compare against the current production model"
          - "Use Airflow's KubernetesPodOperator to trigger each pipeline stage"
          - "Implement a gate function that compares new model accuracy vs production model accuracy"
        solution: |
          # Kubeflow pipeline with automated promotion
          from kfp import dsl
          from kfp.dsl import Input, Output, Dataset, Model, Metrics

          @dsl.component(base_image="python:3.11-slim")
          def validate_and_prepare(data_path: str, clean_data: Output[Dataset]):
              import pandas as pd
              df = pd.read_parquet(data_path)
              assert len(df) > 1000, "Insufficient data"
              assert df.isnull().sum().sum() / df.size < 0.05, "Too many nulls"
              df.dropna().to_parquet(clean_data.path)

          @dsl.component(base_image="nvcr.io/nvidia/pytorch:24.01-py3")
          def train_with_tracking(data: Input[Dataset], model: Output[Model], metrics: Output[Metrics]):
              import mlflow
              mlflow.set_tracking_uri("http://mlflow:5000")
              with mlflow.start_run():
                  acc = train_and_evaluate(data.path, model.path)
                  mlflow.log_metric("accuracy", acc)
                  metrics.log_metric("accuracy", acc)

          @dsl.component(base_image="python:3.11-slim")
          def promote_if_better(model: Input[Model], new_accuracy: float, min_improvement: float = 0.02):
              import mlflow
              client = mlflow.tracking.MlflowClient()
              prod = client.get_latest_versions("my-model", stages=["Production"])
              prod_acc = float(client.get_run(prod[0].run_id).data.metrics["accuracy"])
              if new_accuracy >= prod_acc + min_improvement:
                  client.transition_model_version_stage("my-model", prod[0].version, "Production")
                  trigger_canary_deploy(canary_pct=10)

          @dsl.pipeline(name="daily-retraining")
          def pipeline(data_path: str):
              val = validate_and_prepare(data_path=data_path)
              train = train_with_tracking(data=val.outputs["clean_data"])
              train.set_gpu_limit(8)
              promote_if_better(model=train.outputs["model"], new_accuracy=train.outputs["metrics"])

