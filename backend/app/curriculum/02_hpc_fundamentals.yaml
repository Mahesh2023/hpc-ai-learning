      - id: "hpc-bench-code1"
        title: "Benchmark Analysis Script"
        description: "Write a Python script that parses NCCL test output (lines with size, time, algbw, busbw) and generates a summary showing min/max/avg bus bandwidth."
        exercise_type: "coding"
        difficulty: 3
        hints:
          - "NCCL test output has columns separated by whitespace"
          - "Bus bandwidth is typically the last column"
          - "Filter lines that start with a number (size in bytes)"
        solution: |
          import sys
          bandwidths = []
          for line in sys.stdin:
              parts = line.strip().split()
              if parts and parts[0].isdigit():
                  busbw = float(parts[-1])
                  bandwidths.append(busbw)
          if bandwidths:
              print(f"Min: {min(bandwidths):.1f} GB/s")
              print(f"Max: {max(bandwidths):.1f} GB/s")
              print(f"Avg: {sum(bandwidths)/len(bandwidths):.1f} GB/s")
