        solution: "Embarrassingly parallel hyperparameter sweeps are ideal cloud burst candidates because each trial runs independently on a single GPU with no inter-node communication. This eliminates sensitivity to cloud network latency. Tightly-coupled distributed training requires high-bandwidth, low-latency interconnects (InfiniBand) best served on-prem. Real-time inference needs stable, predictable infrastructure close to users. Notebooks are interactive and latency-sensitive."

      - id: "prof-mastery-multi-cluster-lab1"
        title: "Implement Multi-Cluster Workload Distribution"
        description: |
          Design and implement a multi-cluster workload distribution strategy:

          1. Write a Fleet GitRepo manifest that targets three cluster types: on-prem GPU,
             cloud GPU, and cloud CPU — each with appropriate label selectors.
          2. Create a Python script that queries the Kubernetes API across two clusters,
             aggregates GPU utilization, and recommends which cluster should receive the
             next training job based on available capacity.
          3. Write a Kustomize overlay structure (base + overlays) that customizes a
             PyTorch training job for on-prem (InfiniBand, local NVMe storage) vs. cloud
             (EFA, S3 FUSE mount) environments.

          Deliver all three artifacts as working configuration files and scripts.
        exercise_type: "lab"
        difficulty: 4
        hints:
          - "Use clusterSelector.matchLabels in Fleet targets to differentiate cluster types"
          - "The kubernetes Python client supports multiple kubeconfig contexts — iterate over them"
          - "Kustomize patches can replace volume mounts, node selectors, and environment variables per overlay"
        solution: |
          The Fleet GitRepo should define three targets with distinct label selectors (e.g., accelerator: nvidia-a100, provider: aws, role: cpu-worker). The Python aggregator loads multiple kubeconfig contexts, queries each cluster's node list for 'nvidia.com/gpu' capacity and allocatable values, computes utilization percentages, and returns the cluster with the lowest GPU utilization. The Kustomize structure uses a base/ directory with the core PyTorchJob spec, an overlays/onprem/ directory that patches in hostNetwork: true, InfiniBand device requests, and NVMe hostPath volumes, and an overlays/cloud/ directory that patches in EFA device plugin resources and S3 CSI driver PVCs.

