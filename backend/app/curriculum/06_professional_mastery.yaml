  - id: "multi-cluster-hybrid-cloud"
    title: "Multi-Cluster & Hybrid Cloud"
    order: 1
    objectives:
      - "Understand Kubernetes cluster federation and multi-cluster management patterns"
      - "Design hybrid cloud architectures that burst from on-prem HPC to public cloud"
