      - "Understand file permissions and ownership"
    content_md: |
      # Linux Command Line Mastery

      Almost every HPC cluster and AI training platform runs Linux. Mastering the command line is not optional — it is the foundation everything else builds on.

      ## Navigating the Filesystem

      The Linux filesystem is a tree rooted at `/`. Key directories:

      ```
      /           Root of everything
      /home       User home directories
      /etc        System configuration files
      /var        Variable data (logs, caches)
      /tmp        Temporary files
      /opt        Optional/third-party software
      /proc       Virtual filesystem for process info
      /dev        Device files
      ```

      Essential navigation commands:

      ```bash
      pwd                    # Print working directory
      ls -lah                # List files with details and human-readable sizes
      cd /path/to/dir        # Change directory
      cd ~                   # Go to home directory
      cd -                   # Go to previous directory
      tree -L 2              # Show directory tree, 2 levels deep
      ```

      ## File Operations

      ```bash
      cp source dest         # Copy file
      cp -r dir1 dir2        # Copy directory recursively
      mv old new             # Move or rename
      rm file                # Remove file
      rm -rf directory       # Remove directory (DANGEROUS — no undo!)
      mkdir -p a/b/c         # Create nested directories
      touch newfile.txt      # Create empty file or update timestamp
      ln -s target link      # Create symbolic link
      ```

      ## Viewing and Searching File Contents

      ```bash
      cat file.txt           # Print entire file
      less file.txt          # Paginated viewer (q to quit)
      head -n 20 file.txt    # First 20 lines
      tail -f logfile.log    # Follow log file in real-time
      grep -rn "pattern" .   # Search recursively with line numbers
      find . -name "*.py"    # Find files by name
      wc -l file.txt         # Count lines
      ```

      ## Pipes and Redirects

      Pipes (`|`) connect the output of one command to the input of another. This is one of Linux's most powerful features:

      ```bash
      # Count Python files in a project
      find . -name "*.py" | wc -l

      # Find the 10 largest files
      du -ah . | sort -rh | head -10

      # Search logs for errors and count occurrences
      grep "ERROR" /var/log/app.log | sort | uniq -c | sort -rn

      # Redirect output to a file
      ls -la > filelist.txt      # Overwrite
      echo "append" >> file.txt  # Append
      command 2>&1               # Redirect stderr to stdout
      command > out.log 2>&1     # Redirect both to file
      ```

      ## File Permissions

      Every file has an owner, a group, and three sets of permissions (read, write, execute):

      ```
      -rwxr-xr--  1 user group  4096 Jan 1 12:00 script.sh
      │├─┤├─┤├─┤
      │ │   │  └── Others: read only
      │ │   └───── Group: read + execute
      │ └───────── Owner: read + write + execute
      └──────────── File type (- = regular, d = directory, l = symlink)
      ```

      ```bash
      chmod 755 script.sh     # rwxr-xr-x
      chmod +x script.sh      # Add execute permission
      chmod u+w,g-w file      # Add write for owner, remove for group
      chown user:group file   # Change ownership
      ```

      ## Process Management

      ```bash
      ps aux                  # List all processes
      ps aux | grep python    # Find Python processes
      top                     # Interactive process viewer
      htop                    # Better interactive viewer
      kill PID                # Graceful terminate
      kill -9 PID             # Force kill
      nohup command &         # Run in background, survives logout
      jobs                    # List background jobs
      fg %1                   # Bring job 1 to foreground
      ```

