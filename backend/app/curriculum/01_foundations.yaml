      - id: "foundations-net-code1"
        title: "SSH Config Builder"
        description: |
          Write a Python function that generates an SSH config file string.
          Given a list of host configurations (dicts with name, hostname, user,
          and optional proxy_jump), produce a properly formatted ~/.ssh/config.
        exercise_type: "coding"
        difficulty: 3
        starter_code: |
          def build_ssh_config(hosts: list[dict]) -> str:
              """
              Generate SSH config text from a list of host dicts.
              Each dict has:
                - name: str (Host alias)
                - hostname: str (HostName)
                - user: str (User)
                - proxy_jump: str or None (ProxyJump, optional)
                - identity_file: str or None (IdentityFile, optional)

              Return the complete config as a multi-line string.
              Each host block should be separated by a blank line.
              """
              # YOUR CODE HERE
              pass
        test_cases:
          - label: "Test 1: Single host, no proxy"
            input: '[{"name": "hpc", "hostname": "login.hpc.edu", "user": "jdoe", "proxy_jump": null, "identity_file": "~/.ssh/id_ed25519"}]'
            expected_output: |
              Host hpc
                  HostName login.hpc.edu
                  User jdoe
                  IdentityFile ~/.ssh/id_ed25519
          - label: "Test 2: Two hosts, second uses ProxyJump"
            input: '[{"name": "hpc", "hostname": "login.hpc.edu", "user": "jdoe", "proxy_jump": null, "identity_file": null}, {"name": "gpu01", "hostname": "gpu-node-001", "user": "jdoe", "proxy_jump": "hpc", "identity_file": null}]'
            expected_output: |
              Host hpc
                  HostName login.hpc.edu
                  User jdoe

              Host gpu01
                  HostName gpu-node-001
                  User jdoe
                  ProxyJump hpc
          - label: "Test 3: Empty list returns empty string"
            input: "[]"
            expected_output: ""
            hidden: true
        hints:
          - "Build each host block line by line, only including fields that are not None"
          - "Join blocks with a blank line separator"
        solution: |
          def build_ssh_config(hosts: list[dict]) -> str:
              blocks = []
              for host in hosts:
                  lines = [
                      f"Host {host['name']}",
                      f"    HostName {host['hostname']}",
                      f"    User {host['user']}",
                  ]
                  if host.get("identity_file"):
                      lines.append(f"    IdentityFile {host['identity_file']}")
                  if host.get("proxy_jump"):
                      lines.append(f"    ProxyJump {host['proxy_jump']}")
                  blocks.append("\n".join(lines))
              return "\n\n".join(blocks)

      - id: "foundations-net-code2"
        title: "Bandwidth Calculator"
        description: |
          Write a function that calculates how long it will take to transfer
          a dataset across a network.  Given the dataset size (in GB), network
          bandwidth (in Gbps), and an efficiency factor (0.0 to 1.0 — real
          throughput is always less than theoretical), return the transfer
          time in seconds, minutes, and a human-readable string.
        exercise_type: "coding"
        difficulty: 2
        starter_code: |
          def calculate_transfer_time(
              size_gb: float,
              bandwidth_gbps: float,
              efficiency: float = 0.7
          ) -> dict:
              """
              Calculate network transfer time.

              Args:
                  size_gb: Dataset size in gigabytes
                  bandwidth_gbps: Network bandwidth in gigabits per second
                  efficiency: Fraction of theoretical bandwidth achieved (0.0-1.0)

              Returns:
                  dict with keys:
                    - "seconds": float (total seconds)
                    - "minutes": float (total minutes, rounded to 1 decimal)
                    - "human": str (e.g. "2 min 30 sec" or "1 hr 15 min")
              """
              # YOUR CODE HERE
              pass
        test_cases:
          - label: "Test 1: 100 GB over 100 Gbps InfiniBand"
            input: '{"size_gb": 100, "bandwidth_gbps": 100, "efficiency": 0.8}'
            expected_output: '{"seconds": 10.0, "minutes": 0.2, "human": "10 sec"}'
          - label: "Test 2: 1 TB over 10 Gbps Ethernet"
            input: '{"size_gb": 1000, "bandwidth_gbps": 10, "efficiency": 0.7}'
            expected_output: '{"seconds": 1142.9, "minutes": 19.0, "human": "19 min 3 sec"}'
          - label: "Test 3: Tiny transfer"
            input: '{"size_gb": 0.001, "bandwidth_gbps": 100, "efficiency": 0.9}'
            expected_output: '{"seconds": 0.0, "minutes": 0.0, "human": "0 sec"}'
            hidden: true
        hints:
          - "1 GB = 8 Gbits.  Convert size to bits first."
          - "Effective bandwidth = bandwidth_gbps * efficiency"
          - "For the human-readable string, break into hours/minutes/seconds"
        solution: |
          def calculate_transfer_time(
              size_gb: float,
              bandwidth_gbps: float,
              efficiency: float = 0.7
          ) -> dict:
              size_gbits = size_gb * 8
              effective_bw = bandwidth_gbps * efficiency
              seconds = size_gbits / effective_bw
              minutes = round(seconds / 60, 1)

              # Human-readable
              total_sec = int(seconds)
              if total_sec >= 3600:
                  hrs = total_sec // 3600
                  mins = (total_sec % 3600) // 60
                  human = f"{hrs} hr {mins} min"
              elif total_sec >= 60:
                  mins = total_sec // 60
                  secs = total_sec % 60
                  human = f"{mins} min {secs} sec"
              else:
                  human = f"{total_sec} sec"

              return {
                  "seconds": round(seconds, 1),
                  "minutes": minutes,
                  "human": human,
              }

      - id: "foundations-net-lab1"
        title: "Network Diagnostics Lab"
        description: |
          **Guided Lab: Diagnosing Network Connectivity on an HPC Cluster**

          In this hands-on lab you will use standard network tools to
          investigate connectivity and performance.

          **Step 1 — Check your network interfaces**
          1. Run `ip addr show` to list all interfaces.
          2. Identify the management (eth0) and high-speed (ib0) interfaces.
          3. Note the IP addresses assigned to each.

          **Step 2 — Test basic connectivity**
          1. Ping the default gateway: `ping -c 4 $(ip route | grep default | awk '{print $3}')`.
          2. Ping a cluster node: `ping -c 4 gpu-node-001`.
          3. Note the round-trip times — are they consistent?

          **Step 3 — Trace the route**
          1. Run `traceroute gpu-node-001` to see the path.
          2. How many hops? In an HPC cluster, it should be 1-2 hops (through a switch).
          3. Compare with `traceroute google.com` (many hops through the internet).

          **Step 4 — Check listening ports**
          1. Run `ss -tlnp` to see what services are listening.
          2. Look for sshd on port 22.
          3. If a Jupyter server is running, look for port 8888.

          **Step 5 — Test bandwidth (if iperf3 is available)**
          1. On another node: `iperf3 -s` (starts the server).
          2. On your node: `iperf3 -c OTHER_NODE_IP -t 5`.
          3. Compare the result with the theoretical bandwidth of the link.

          **Step 6 — Check DNS resolution**
          1. `nslookup gpu-node-001` — does it resolve?
          2. `cat /etc/resolv.conf` — what DNS servers are configured?
        exercise_type: "lab"
        difficulty: 3
        hints:
          - "On many HPC clusters, ib0 is the InfiniBand interface"
          - "If ping fails, check if ICMP is blocked by a firewall"
          - "iperf3 bandwidth results are in Gbits/sec by default"
        solution: |
          # Step 1
          ip addr show

          # Step 2
          ping -c 4 $(ip route | grep default | awk '{print $3}')
          ping -c 4 gpu-node-001

          # Step 3
          traceroute gpu-node-001
          traceroute google.com

          # Step 4
          ss -tlnp

          # Step 5
          # On server node: iperf3 -s
          iperf3 -c gpu-node-001 -t 5

          # Step 6
          nslookup gpu-node-001
          cat /etc/resolv.conf

      - id: "foundations-net-q3"
