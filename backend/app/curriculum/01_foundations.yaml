  - id: "git-version-control"
    title: "Version Control with Git"
    order: 4
    objectives:
      - "Use Git for daily development workflows"
      - "Understand branching, merging, and rebasing"
      - "Collaborate effectively with remote repositories"
    content_md: |
      # Version Control with Git

      Every piece of infrastructure code, training script, and configuration should be version-controlled.

      ## Core Workflow

      ```bash
      git init                        # Initialize a new repo
      git clone url                   # Clone existing repo
      git status                      # Check what's changed
      git add .                       # Stage all changes
      git commit -m "description"     # Commit with message
      git push origin main            # Push to remote
      git pull origin main            # Pull latest changes
      ```

      ## Branching Strategies

      ```bash
      git checkout -b feature/gpu-monitoring   # Create and switch to branch
      git branch -a                            # List all branches
      git merge feature/gpu-monitoring         # Merge branch into current
      git rebase main                          # Rebase current branch onto main
      ```

      For AI platform work, a common workflow:
      1. `main` branch — production infrastructure code
      2. `develop` branch — integration testing
      3. Feature branches — individual changes
      4. Tags — versioned releases of infrastructure

      ## Git for ML Projects

      ```bash
      # .gitignore for ML projects
      *.pt             # Model checkpoints
      *.onnx           # Exported models
      data/            # Large datasets (use DVC or Git LFS)
      wandb/           # Experiment tracking logs
      __pycache__/     # Python cache
      .env             # Environment variables with secrets
      ```

    exercises:
      - id: "foundations-git-q1"
        title: "Git Branching Quiz"
        description: "What is the difference between git merge and git rebase?"
        exercise_type: "quiz"
        difficulty: 2
        options:
          - "They are identical operations"
          - "Merge creates a merge commit; rebase replays commits linearly"
          - "Rebase is only for remote branches"
          - "Merge is faster than rebase"
        correct_answer: "Merge creates a merge commit; rebase replays commits linearly"
        hints:
          - "Think about how each operation affects the commit history graph"
        solution: "Merge creates a merge commit; rebase replays commits linearly"

  - id: "shell-scripting"
    title: "Shell Scripting & Automation"
    order: 5
    objectives:
      - "Write robust bash scripts for infrastructure automation"
      - "Use cron and systemd for scheduled tasks"
      - "Build deployment and monitoring scripts"
    content_md: |
      # Shell Scripting & Automation

      Shell scripts automate repetitive tasks: deploying models, monitoring GPUs, rotating logs, health checks.

      ## Bash Script Structure

      ```bash
      #!/bin/bash
      set -euo pipefail   # Exit on error, undefined vars, pipe failures

      # Variables
      CLUSTER_NAME="${CLUSTER_NAME:-default}"
      LOG_DIR="/var/log/${CLUSTER_NAME}"
      GPU_THRESHOLD=90

      # Functions
      check_gpu_health() {
          local node=$1
          local util=$(ssh "$node" nvidia-smi --query-gpu=utilization.gpu \
                       --format=csv,noheader,nounits | head -1)
          if [[ "$util" -gt "$GPU_THRESHOLD" ]]; then
              echo "[WARN] $node GPU utilization at ${util}%"
          fi
      }

      # Main logic
      echo "Checking GPU health on cluster: $CLUSTER_NAME"
      for node in node-{001..008}; do
          check_gpu_health "$node"
      done
      ```

      ## Scheduling with Cron

      ```bash
      # Edit crontab
      crontab -e

      # Run GPU health check every 5 minutes
      */5 * * * * /opt/scripts/gpu_health.sh >> /var/log/gpu_health.log 2>&1

      # Daily model checkpoint backup at 2 AM
      0 2 * * * /opt/scripts/backup_checkpoints.sh

      # Weekly cluster report on Monday at 9 AM
      0 9 * * 1 /opt/scripts/weekly_report.sh | mail -s "Cluster Report" admin@company.com
      ```

      ## Systemd Service Files

      For long-running services (metrics exporters, model servers):

      ```ini
      [Unit]
      Description=GPU Metrics Exporter
      After=network.target

      [Service]
      Type=simple
      User=monitor
      ExecStart=/opt/monitoring/gpu_exporter --port 9400
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
      ```

      ```bash
      sudo systemctl enable gpu-exporter
      sudo systemctl start gpu-exporter
      sudo systemctl status gpu-exporter
      ```

    exercises:
      - id: "foundations-shell-q1"
        title: "set -euo pipefail"
        description: "What does 'set -euo pipefail' do at the top of a bash script?"
        exercise_type: "quiz"
        difficulty: 2
        options:
          - "Enables verbose output"
          - "Exits on error, undefined variables, and pipe failures"
          - "Sets the script to run as root"
          - "Enables debug mode"
        correct_answer: "Exits on error, undefined variables, and pipe failures"
        hints:
          - "-e = exit on error, -u = treat undefined variables as errors, -o pipefail = pipe exit code"
        solution: "Exits on error, undefined variables, and pipe failures"

      - id: "foundations-shell-code1"
        title: "Health Check Script"
        description: "Write a bash script that checks if a list of nodes are reachable via SSH and reports their GPU count."
        exercise_type: "coding"
        difficulty: 3
        hints:
          - "Use a for loop over node names"
          - "ssh node nvidia-smi -L to list GPUs"
          - "Use $? to check if the SSH command succeeded"
        solution: |
          #!/bin/bash
          set -uo pipefail
          NODES=("node-001" "node-002" "node-003" "node-004")
          for node in "${NODES[@]}"; do
              if ssh -o ConnectTimeout=5 "$node" nvidia-smi -L 2>/dev/null; then
                  gpu_count=$(ssh "$node" nvidia-smi -L | wc -l)
                  echo "$node: OK ($gpu_count GPUs)"
              else
                  echo "$node: UNREACHABLE"
              fi
          done
