              ]

              if modules:
                  lines.append("module purge")
                  for mod in modules:
                      lines.append(f"module load {mod}")
                  lines.append("")

              if venv_path:
                  lines.append(f"source {venv_path}/bin/activate")
                  lines.append("")

              lines.append(command)
              lines.append("")

              return "\n".join(lines)

      - id: "foundations-shell-code2"
        title: "Training Log Parser"
        description: |
