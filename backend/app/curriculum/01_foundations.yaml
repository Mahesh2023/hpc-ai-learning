  # ==========================================================================
  # LESSON 4: Version Control with Git
  # ==========================================================================
  - id: "git"
    title: "Version Control with Git"
    order: 4
    objectives:
      - "Use Git for tracking experiments, configs, and scripts on HPC"
      - "Master the core workflow: init, add, commit, diff, log, branch, merge"
      - "Work with remote repositories: clone, push, pull, fetch, rebase"
      - "Apply HPC-specific Git patterns: .gitignore, LFS, submodules"
      - "Collaborate effectively with pull requests and code review"
    content_md: |
      # Version Control with Git

      Every piece of infrastructure code, training script, job configuration,
      and experiment config should be version-controlled. In HPC/AI work, Git
      is not just for collaboration — it is how you keep your sanity when
      running hundreds of experiments across dozens of nodes.

      ---

      ## 1. Why Git Matters for HPC

      Without version control, you end up with:
      ```
      train.py
      train_v2.py
      train_v2_fixed.py
      train_v2_fixed_FINAL.py
      train_v2_fixed_FINAL_actually_final.py    ← we've all been here
      ```

      With Git:
      ```
      train.py                   (one file, full history)
      git log --oneline:
        a1b2c3d  Fix learning rate schedule for A100 GPUs
        e4f5g6h  Add mixed precision training
        i7j8k9l  Initial training script
      ```

      ---

      ## 2. Core Git Workflow

      ### Initial Setup

      ```bash
      # Configure your identity (do this once)
      git config --global user.name "Jane Doe"
      git config --global user.email "jdoe@university.edu"
      git config --global init.defaultBranch main

      # Optional but recommended
      git config --global pull.rebase true    # Cleaner pull history
      git config --global core.editor vim     # Your preferred editor
      ```

      ### The Fundamental Loop

      ```
      ┌─────────────┐    git add    ┌─────────────┐   git commit   ┌─────────────┐
      │  Working     │ ──────────> │  Staging     │ ────────────> │  Repository  │
      │  Directory   │             │  Area        │               │  (.git/)     │
      │  (modified)  │ <────────── │  (indexed)   │ <──────────── │  (committed) │
      └─────────────┘  git restore └─────────────┘  git reset     └─────────────┘
      ```

      ```bash
      # Start a new repo
      git init my-hpc-project
      cd my-hpc-project

      # Or clone an existing one
      git clone git@github.com:org/hpc-training.git
      cd hpc-training

      # The daily workflow
      git status                      # What's changed?
      git diff                        # See the actual changes
      git add train.py config.yaml    # Stage specific files
      git add -A                      # Stage everything
      git commit -m "Add distributed training support"

      # View history
      git log --oneline --graph --all    # Compact visual history
      git log -p train.py               # History of changes to one file
      git show abc1234                   # See a specific commit
      ```

      ### Writing Good Commit Messages

      ```
      # BAD commit messages:
      "fix"
      "update"
      "stuff"
      "WIP"

      # GOOD commit messages (imperative mood, explain WHY):
      "Fix OOM error by reducing batch size to 32 on A100 nodes"
      "Add NCCL environment variables for multi-node training"
      "Switch optimizer from Adam to AdamW per paper v2 results"
      ```

      Try the basic Git workflow — init, add, commit, and view history:

      :::interactive{component="TerminalSimulator" config='{"preset":"git-workflow"}'}

      ---

      ## 3. Branching and Merging

      Branches let you work on features without breaking the main codebase.

      ```bash
      # Create and switch to a new branch
      git checkout -b feature/multi-node-training

      # List all branches
      git branch -a

      # Switch between branches
      git checkout main
      git checkout feature/multi-node-training

      # Modern alternative (Git 2.23+)
      git switch -c feature/multi-node-training
      git switch main
      ```

      ### Merging

      ```
      main:     A ── B ── C ──────── F (merge commit)
                             \      /
      feature:                D ── E
      ```

      ```bash
      # Merge a feature into main
      git checkout main
      git merge feature/multi-node-training

      # If there are conflicts:
      # 1. Git marks the conflicted files
      # 2. Edit them to resolve
      # 3. git add resolved_file.py
      # 4. git commit
      ```

      ### Rebasing (for cleaner history)

      ```
      Before rebase:
      main:     A ── B ── C
                      \
      feature:         D ── E

      After rebase:
      main:     A ── B ── C
                            \
      feature:               D' ── E'
      ```

      ```bash
      # Rebase your feature branch onto latest main
      git checkout feature/multi-node-training
      git rebase main

      # Interactive rebase — squash messy commits
      git rebase -i HEAD~3    # Rewrite last 3 commits
      ```

      Visualize how branches, merges, and rebases change the commit graph:

      :::interactive{component="GitVisualizer" config='{"preset":"feature-branch"}'}

      ---

      ## 4. Remote Workflows

      ```bash
      # Add a remote
      git remote add origin git@github.com:org/hpc-project.git

      # Push your branch
      git push origin feature/multi-node-training

      # Set upstream tracking (first push)
      git push -u origin feature/multi-node-training

      # Pull latest changes
      git pull origin main

      # Fetch without merging (safer)
      git fetch origin
      git log origin/main..main   # See what's different
      ```

      ---

      ## 5. HPC-Specific Git Patterns

      ### .gitignore for HPC/AI Projects

      ```gitignore
      # .gitignore

      # Data files — too large for Git
      *.h5
      *.hdf5
      *.parquet
      *.csv
      data/

      # Model checkpoints
      *.pt
      *.pth
      *.onnx
      *.safetensors
      checkpoints/

      # Logs and outputs
      *.log
      slurm-*.out
      wandb/
      tensorboard/
      outputs/

      # Python
      __pycache__/
      *.pyc
      .venv/
      *.egg-info/

      # Environment and secrets
      .env
      *.key
      *.pem

      # OS files
      .DS_Store
      Thumbs.db
      ```

      ### Git LFS for Large Files

      Sometimes you NEED to version large files (trained models, reference
      datasets). Git LFS stores them outside the repo with pointers.

      ```bash
      # Install and set up LFS
      git lfs install

      # Track large file types
      git lfs track "*.pt"
      git lfs track "*.safetensors"
      git lfs track "data/reference_dataset.h5"

      # This creates/updates .gitattributes — commit it!
      git add .gitattributes
      git commit -m "Configure Git LFS for model files"

      # Now git add/commit/push works normally — LFS handles the rest
      git add model.pt
      git commit -m "Add trained model checkpoint"
      git push
      ```

      ### Submodules for Shared Libraries

      ```bash
      # Add a shared library as a submodule
      git submodule add git@github.com:org/hpc-utils.git lib/hpc-utils

      # Clone a repo that has submodules
      git clone --recurse-submodules git@github.com:org/project.git

      # Update submodules to latest
      git submodule update --remote --merge
      ```

      Practice configuring .gitignore and Git LFS for HPC projects:

      :::interactive{component="TerminalSimulator" config='{"preset":"git-workflow"}'}

      ---

      ## 6. Collaboration: Pull Requests and Code Review

      The standard collaboration workflow:

      ```
      1. Fork or clone the repo
      2. Create a feature branch
      3. Make your changes, commit, push
      4. Open a Pull Request (PR) on GitHub/GitLab
      5. Teammates review the code
      6. Address feedback, push more commits
      7. Merge when approved
      ```

      ### Handling Merge Conflicts

      ```
      <<<<<<< HEAD (your changes)
      learning_rate = 0.001
      =======
      learning_rate = 0.0005
      >>>>>>> feature/tune-lr (incoming changes)
      ```

      To resolve:
      1. Edit the file — pick the right value (or combine).
      2. Remove the `<<<<<<<`, `=======`, `>>>>>>>` markers.
      3. `git add` the file.
      4. `git commit`.

      ---

      ## Interactive Lab

      Practice the Git workflow in this guided environment — create repos,
      branch, commit, merge, and resolve conflicts hands-on:

      :::interactive{component="GitVisualizer" config='{"preset":"rebase-vs-merge"}'}

      ---

      ## Summary

      | Skill             | Key Commands                                     |
      |-------------------|--------------------------------------------------|
      | Core workflow     | `init`, `add`, `commit`, `status`, `diff`, `log` |
      | Branching         | `branch`, `checkout -b`, `switch`, `merge`        |
      | Remote ops        | `clone`, `push`, `pull`, `fetch`, `remote`        |
      | History           | `log --oneline --graph`, `show`, `blame`          |
      | HPC patterns      | `.gitignore`, `git lfs`, `submodule`              |
      | Collaboration     | PRs, code review, conflict resolution             |

    exercises:
      - id: "foundations-git-q1"
        title: "Git Branching Quiz"
        description: "What is the key difference between `git merge` and `git rebase`?"
        exercise_type: "quiz"
        difficulty: 2
        options:
          - "They are identical operations"
          - "Merge creates a merge commit preserving branch history; rebase replays commits linearly onto the target"
          - "Rebase can only be used on remote branches"
          - "Merge is always faster than rebase"
        correct_answer: "Merge creates a merge commit preserving branch history; rebase replays commits linearly onto the target"
        hints:
          - "Think about how each operation changes the commit graph"
          - "Merge preserves the true history; rebase creates a linear history"
        solution: "Merge creates a merge commit that joins two branches; rebase rewrites history by replaying commits on top of the target branch, creating a linear history."

      - id: "foundations-git-q2"
        title: "Git LFS Quiz"
        description: "Your HPC project has 50 GB of model checkpoints that need version control. What is the best approach?"
        exercise_type: "quiz"
        difficulty: 2
        options:
          - "Just git add them — Git handles large files fine"
          - "Use Git LFS to track *.pt files and store them with LFS pointers"
          - "Put them in .gitignore and manage them manually"
          - "Compress them into a single tar file and commit that"
        correct_answer: "Use Git LFS to track *.pt files and store them with LFS pointers"
        hints:
          - "Standard Git stores every version of every file in .git/ — 50 GB of checkpoints would make cloning impossible"
          - "Git LFS stores large files on a separate server and only downloads them when needed"
        solution: "Use Git LFS — it replaces large files with lightweight pointers in the repo and stores the actual files on a separate LFS server."

      - id: "foundations-git-code1"
        title: "Gitignore Pattern Builder"
        description: |
          Write a Python function that generates a .gitignore file for an HPC/AI
          project.  Given lists of file extensions to ignore, directories to ignore,
          and specific files to ignore, produce a properly formatted .gitignore
          string with section comments.
        exercise_type: "coding"
        difficulty: 2
        starter_code: |
          def build_gitignore(
              extensions: list[str],
              directories: list[str],
              files: list[str],
              project_name: str = "HPC Project"
          ) -> str:
              """
              Generate a .gitignore file string.

              Args:
                  extensions: List of extensions to ignore (e.g., [".pt", ".log"])
                  directories: List of directories to ignore (e.g., ["data/", "__pycache__/"])
                  files: List of specific files to ignore (e.g., [".env", "secrets.yaml"])
                  project_name: Name for the header comment

              Returns:
                  Formatted .gitignore string with section headers.
              """
              # YOUR CODE HERE
              pass
        test_cases:
          - label: "Test 1: Basic HPC gitignore"
            input: '{"extensions": [".pt", ".log"], "directories": ["data/", "__pycache__/"], "files": [".env"], "project_name": "My HPC Project"}'
            expected_output: |
              # .gitignore for My HPC Project

              # File extensions
              *.pt
              *.log

              # Directories
              data/
              __pycache__/

              # Specific files
              .env
          - label: "Test 2: Empty lists produce empty sections"
            input: '{"extensions": [], "directories": ["logs/"], "files": [], "project_name": "Test"}'
            expected_output: |
              # .gitignore for Test

              # Directories
              logs/
          - label: "Test 3: Many extensions"
            input: '{"extensions": [".pt", ".pth", ".onnx", ".h5", ".safetensors"], "directories": [], "files": [".env"], "project_name": "AI"}'
            expected_output: "contains *.pt and *.safetensors and .env"
            hidden: true
        hints:
          - "Add a * prefix to each extension to make glob patterns"
          - "Only include section headers for non-empty lists"
          - "End the file with a newline"
        solution: |
          def build_gitignore(
              extensions: list[str],
              directories: list[str],
              files: list[str],
              project_name: str = "HPC Project"
          ) -> str:
              lines = [f"# .gitignore for {project_name}", ""]

              if extensions:
                  lines.append("# File extensions")
                  for ext in extensions:
                      ext = ext if ext.startswith(".") else f".{ext}"
                      lines.append(f"*{ext}")
                  lines.append("")

              if directories:
                  lines.append("# Directories")
                  for d in directories:
                      d = d if d.endswith("/") else f"{d}/"
                      lines.append(d)
                  lines.append("")

              if files:
                  lines.append("# Specific files")
                  for f in files:
                      lines.append(f)
                  lines.append("")

              return "\n".join(lines)

      - id: "foundations-git-code2"
        title: "Commit Message Parser"
        description: |
          Write a function that parses `git log --oneline` output and returns
          structured data.  Each line has the format: `<short_hash> <message>`.
          The function should return a list of dicts and optionally filter by
          a keyword.
        exercise_type: "coding"
        difficulty: 2
        starter_code: |
          def parse_git_log(log_output: str, keyword: str = None) -> list[dict]:
              """
              Parse git log --oneline output.

              Args:
                  log_output: Multi-line string from `git log --oneline`
                  keyword: Optional keyword to filter commits (case-insensitive)

              Returns:
                  List of dicts with keys "hash" and "message".
                  If keyword is provided, only include commits whose message
                  contains the keyword (case-insensitive).
              """
              # YOUR CODE HERE
              pass
        test_cases:
          - label: "Test 1: Parse three commits"
            input: |
              a1b2c3d Fix OOM error in training loop
              e4f5g6h Add multi-node support
              i7j8k9l Initial commit
            expected_output: '[{"hash": "a1b2c3d", "message": "Fix OOM error in training loop"}, {"hash": "e4f5g6h", "message": "Add multi-node support"}, {"hash": "i7j8k9l", "message": "Initial commit"}]'
          - label: "Test 2: Filter by keyword"
            input: |
              a1b2c3d Fix OOM error in training loop
              e4f5g6h Add multi-node support
              i7j8k9l Fix typo in config
            expected_output: '[{"hash": "a1b2c3d", "message": "Fix OOM error in training loop"}, {"hash": "i7j8k9l", "message": "Fix typo in config"}]'
          - label: "Test 3: Empty log"
            input: ""
            expected_output: "[]"
            hidden: true
        hints:
          - "Split on newline, then split each line at the first space"
          - "Use str.lower() for case-insensitive keyword matching"
          - "Handle empty/whitespace-only input"
        solution: |
          def parse_git_log(log_output: str, keyword: str = None) -> list[dict]:
              if not log_output.strip():
                  return []
              commits = []
              for line in log_output.strip().split("\n"):
                  line = line.strip()
                  if not line:
                      continue
                  parts = line.split(" ", 1)
                  if len(parts) < 2:
                      continue
                  commit = {"hash": parts[0], "message": parts[1]}
                  if keyword is None or keyword.lower() in commit["message"].lower():
                      commits.append(commit)
              return commits

      - id: "foundations-git-code3"
        title: "Merge Conflict Resolver"
        description: |
          Write a function that detects and reports merge conflicts in a file.
          Given the text content of a file, find all conflict blocks (delimited
          by <<<<<<< , =======, and >>>>>>>) and return a list of conflict
          descriptions including line numbers and the two versions.
        exercise_type: "coding"
        difficulty: 4
        starter_code: |
          def find_conflicts(file_content: str) -> list[dict]:
              """
              Find merge conflict blocks in file content.

              Returns a list of dicts, each with:
                - "start_line": int (1-based line number of <<<<<<<)
                - "separator_line": int (line number of =======)
                - "end_line": int (line number of >>>>>>>)
                - "ours": str (content between <<<<<<< and =======)
                - "theirs": str (content between ======= and >>>>>>>)
              """
              # YOUR CODE HERE
              pass
        test_cases:
          - label: "Test 1: Single conflict"
            input: |
              normal line
              <<<<<<< HEAD
              learning_rate = 0.001
              =======
              learning_rate = 0.0005
              >>>>>>> feature/tune-lr
              another normal line
            expected_output: '[{"start_line": 2, "separator_line": 4, "end_line": 6, "ours": "learning_rate = 0.001", "theirs": "learning_rate = 0.0005"}]'
          - label: "Test 2: No conflicts"
            input: "clean file\nno conflicts here\n"
            expected_output: "[]"
          - label: "Test 3: Multiple conflicts"
            input: |
              <<<<<<< HEAD
              a = 1
              =======
              a = 2
              >>>>>>> branch
              ok
              <<<<<<< HEAD
              b = 10
              =======
              b = 20
              >>>>>>> branch
            expected_output: "len(result) == 2"
            hidden: true
        hints:
          - "Iterate through lines tracking state: outside, in_ours, in_theirs"
          - "When you hit <<<<<<< start a new conflict, ======= switches sides, >>>>>>> ends it"
          - "Accumulate lines for 'ours' and 'theirs' separately"
        solution: |
          def find_conflicts(file_content: str) -> list[dict]:
              lines = file_content.split("\n")
              conflicts = []
              i = 0
              while i < len(lines):
                  if lines[i].startswith("<<<<<<<"):
                      start_line = i + 1
                      ours_lines = []
                      theirs_lines = []
                      i += 1
                      while i < len(lines) and not lines[i].startswith("======="):
                          ours_lines.append(lines[i])
                          i += 1
                      separator_line = i + 1
                      i += 1
                      while i < len(lines) and not lines[i].startswith(">>>>>>>"):
                          theirs_lines.append(lines[i])
                          i += 1
                      end_line = i + 1
                      conflicts.append({
                          "start_line": start_line,
                          "separator_line": separator_line,
                          "end_line": end_line,
                          "ours": "\n".join(ours_lines),
                          "theirs": "\n".join(theirs_lines),
                      })
                  i += 1
              return conflicts

      - id: "foundations-git-lab1"
        title: "Git Workflow Lab"
        description: |
          **Guided Lab: Complete Git Workflow for an HPC Project**

          Practice the full Git workflow from initialization to collaboration.

          **Step 1 — Initialize a repository**
          1. `mkdir /tmp/hpc-experiment && cd /tmp/hpc-experiment`
          2. `git init`
          3. Create a `train.py` file with a simple print statement.
          4. `git add train.py && git commit -m "Initial training script"`

          **Step 2 — Create a .gitignore**
          1. Create `.gitignore` with entries for `*.pt`, `*.log`, `data/`, `__pycache__/`
          2. `git add .gitignore && git commit -m "Add .gitignore for HPC project"`
          3. Verify: `touch model.pt && git status` — model.pt should be ignored.

          **Step 3 — Feature branch workflow**
          1. `git checkout -b feature/add-config`
          2. Create `config.yaml` with training hyperparameters.
          3. `git add config.yaml && git commit -m "Add training configuration"`
          4. `git checkout main`
          5. `git merge feature/add-config`
          6. `git log --oneline --graph`

          **Step 4 — Simulate a merge conflict**
          1. `git checkout -b branch-a && echo 'lr: 0.001' > config.yaml && git commit -am "Set lr to 0.001"`
          2. `git checkout main && git checkout -b branch-b && echo 'lr: 0.0005' > config.yaml && git commit -am "Set lr to 0.0005"`
          3. `git checkout main && git merge branch-a` (succeeds)
          4. `git merge branch-b` (CONFLICT!)
          5. Edit `config.yaml` to resolve, then `git add config.yaml && git commit`

          **Step 5 — Inspect history**
          1. `git log --oneline --graph --all`
          2. `git diff HEAD~2..HEAD`
          3. `git blame config.yaml`
        exercise_type: "lab"
        difficulty: 3
        hints:
          - "Use `git status` frequently to understand what state you're in"
          - "When resolving conflicts, remove the <<<<<<< ======= >>>>>>> markers completely"
          - "git log --graph shows the branch structure visually"
        solution: |
          mkdir /tmp/hpc-experiment && cd /tmp/hpc-experiment
          git init
          echo 'print("Training started")' > train.py
          git add train.py && git commit -m "Initial training script"

          printf '*.pt\n*.log\ndata/\n__pycache__/\n' > .gitignore
          git add .gitignore && git commit -m "Add .gitignore for HPC project"

          git checkout -b feature/add-config
          printf 'epochs: 100\nlr: 0.001\nbatch_size: 32\n' > config.yaml
          git add config.yaml && git commit -m "Add training configuration"
          git checkout main
          git merge feature/add-config

          git checkout -b branch-a
          echo 'lr: 0.001' > config.yaml && git commit -am "Set lr to 0.001"
          git checkout main
          git checkout -b branch-b
          echo 'lr: 0.0005' > config.yaml && git commit -am "Set lr to 0.0005"
          git checkout main && git merge branch-a
          git merge branch-b  # conflict!
          echo 'lr: 0.0005' > config.yaml  # resolve
          git add config.yaml && git commit -m "Resolve lr conflict: use 0.0005"
          git log --oneline --graph --all

  # ==========================================================================
  # LESSON 5: Shell Scripting & Automation
  # ==========================================================================
  - id: "shell-scripting"
    title: "Shell Scripting & Automation"
    order: 5
    objectives:
      - "Write robust Bash scripts for HPC automation"
      - "Use variables, loops, conditionals, and functions effectively"
      - "Write SLURM job scripts (preview for Module 2)"
      - "Implement proper error handling with set -euo pipefail and trap"
      - "Build practical scripts: job wrappers, log parsers, cleanup tools"
    content_md: |
      # Shell Scripting & Automation

      Shell scripts are the automation glue of HPC. They submit jobs, parse
      logs, clean up scratch space, monitor GPU health, and chain workflows
      together. A well-written shell script can save you hours of manual
      work every week.

      ---

      ## 1. Bash Script Fundamentals

      Every bash script should start with a shebang and safety flags:

      ```bash
      #!/bin/bash
      set -euo pipefail

      # What does set -euo pipefail do?
      # -e  : Exit immediately if any command fails (non-zero exit code)
      # -u  : Treat undefined variables as errors (catches typos!)
      # -o pipefail : A pipeline fails if ANY command in it fails
      #               (not just the last one)
      ```

      ### Why this matters

      Without `set -euo pipefail`:
      ```bash
      rm -rf $UNDEF_VAR/*    # $UNDEF_VAR is empty → this becomes rm -rf /*  😱
      ```

      With `set -u`:
      ```bash
      rm -rf $UNDEF_VAR/*    # ERROR: UNDEF_VAR: unbound variable  ✓ (safe!)
      ```

      ---

      ## 2. Variables and Data Types

      ```bash
      # String variables
      CLUSTER_NAME="production-gpu"
      JOB_NAME="bert-finetune"
      OUTPUT_DIR="/scratch/$USER/results/${JOB_NAME}"

      # Integer arithmetic
      NUM_NODES=4
      GPUS_PER_NODE=8
      TOTAL_GPUS=$((NUM_NODES * GPUS_PER_NODE))
      echo "Total GPUs: $TOTAL_GPUS"    # 32

      # Default values (if variable is unset)
      BATCH_SIZE="${BATCH_SIZE:-32}"      # Use 32 if BATCH_SIZE not set
      LOG_LEVEL="${LOG_LEVEL:-INFO}"      # Use INFO if LOG_LEVEL not set

      # Read-only constants
      readonly MAX_RETRIES=3
      readonly SCRATCH="/scratch/$USER"

      # Arrays
      NODES=("node-001" "node-002" "node-003" "node-004")
      echo "First node: ${NODES[0]}"
      echo "All nodes: ${NODES[@]}"
      echo "Node count: ${#NODES[@]}"
      ```

      ---

      ## 3. String Manipulation

      ```bash
      FILE="/scratch/jdoe/experiments/run_042/model_epoch_10.pt"

      # Extraction
      echo "${FILE##*/}"           # model_epoch_10.pt  (filename only)
      echo "${FILE%/*}"            # /scratch/jdoe/experiments/run_042  (directory)
      echo "${FILE%.pt}"           # ...model_epoch_10  (remove extension)
      echo "${FILE##*.}"           # pt  (extension only)

      # Replacement
      echo "${FILE/run_042/run_043}"   # Replace run_042 with run_043

      # Length
      echo "${#FILE}"              # String length

      # Substrings
      STR="Hello World"
      echo "${STR:0:5}"           # Hello
      echo "${STR:6}"             # World
      ```

      ---

      ## 4. Conditionals

      ```bash
      # File tests
      if [[ -f "$FILE" ]]; then
          echo "File exists"
      fi

      if [[ -d "$DIR" ]]; then
          echo "Directory exists"
      fi

      if [[ -x "$SCRIPT" ]]; then
          echo "Script is executable"
      fi

      # String comparison
      if [[ "$STATUS" == "COMPLETED" ]]; then
          echo "Job finished successfully"
      elif [[ "$STATUS" == "FAILED" ]]; then
          echo "Job failed!"
          exit 1
      else
          echo "Unknown status: $STATUS"
      fi

      # Numeric comparison
      GPU_UTIL=95
      if (( GPU_UTIL > 90 )); then
          echo "WARNING: GPU utilization at ${GPU_UTIL}%"
      fi

      # Combining conditions
      if [[ -f "model.pt" ]] && [[ $(stat -c%s "model.pt") -gt 1000000 ]]; then
          echo "Model checkpoint exists and is > 1 MB"
      fi
      ```

      ---

      ## 5. Loops

      ```bash
      # For loop — iterate over a list
      for node in node-{001..008}; do
          echo "Checking $node..."
          ssh "$node" hostname
      done

      # For loop — iterate over files
      for logfile in /scratch/$USER/logs/*.log; do
          errors=$(grep -c "ERROR" "$logfile" 2>/dev/null || echo 0)
          echo "$logfile: $errors errors"
      done

      # C-style for loop
      for ((i=0; i<10; i++)); do
          echo "Iteration $i"
      done

      # While loop — read a file line by line
      while IFS= read -r line; do
          echo "Processing: $line"
      done < nodes.txt

      # While loop — retry with backoff
      ATTEMPT=0
      MAX_RETRIES=5
      while (( ATTEMPT < MAX_RETRIES )); do
          if ssh node-001 hostname &>/dev/null; then
              echo "Node is up!"
              break
          fi
          ATTEMPT=$((ATTEMPT + 1))
          echo "Attempt $ATTEMPT failed, retrying in ${ATTEMPT}s..."
          sleep "$ATTEMPT"
      done
      ```

