  - id: "python-infra"
    title: "Python for Infrastructure"
    order: 2
    objectives:
      - "Use subprocess to run system commands from Python"
      - "Work with os, pathlib, and shutil for file operations"
      - "Build CLI tools with argparse"
      - "Write infrastructure automation scripts"
    content_md: |
      # Python for Infrastructure

      Python is the glue language of AI infrastructure. You will use it to automate deployments, parse configurations, manage clusters, and build tooling.

      ## Running System Commands

      ```python
      import subprocess

      # Simple command execution
      result = subprocess.run(
          ["nvidia-smi", "--query-gpu=name,memory.total", "--format=csv"],
          capture_output=True, text=True, check=True
      )
      print(result.stdout)

      # With shell features (pipes, globs)
      result = subprocess.run(
          "ps aux | grep python | wc -l",
          shell=True, capture_output=True, text=True
      )
      print(f"Python processes: {result.stdout.strip()}")
      ```

      ## File System Operations with pathlib

      ```python
      from pathlib import Path

      # Modern path handling
      config_dir = Path.home() / ".config" / "myapp"
      config_dir.mkdir(parents=True, exist_ok=True)

      # Iterate over files
      for py_file in Path("/project").rglob("*.py"):
          print(f"{py_file}: {py_file.stat().st_size} bytes")

      # Read and write
      config = config_dir / "settings.yaml"
      config.write_text("key: value\n")
      content = config.read_text()
      ```

      ## Building CLI Tools

      ```python
      import argparse

      def main():
          parser = argparse.ArgumentParser(description="GPU Monitor")
          parser.add_argument("--interval", type=int, default=5,
                              help="Polling interval in seconds")
          parser.add_argument("--output", type=Path, default=None,
                              help="Output file for metrics")
          parser.add_argument("--gpus", nargs="+", type=int,
                              help="GPU indices to monitor")
          args = parser.parse_args()

          # Use args.interval, args.output, args.gpus
          print(f"Monitoring GPUs every {args.interval}s")

      if __name__ == "__main__":
          main()
      ```

      ## Environment and Configuration Management

      ```python
      import os
      import json
      import yaml  # pip install pyyaml

      # Environment variables
      gpu_count = int(os.environ.get("NUM_GPUS", "1"))
      cluster_name = os.environ.get("CLUSTER_NAME", "default")

      # YAML config loading
      with open("cluster_config.yaml") as f:
          config = yaml.safe_load(f)

      nodes = config["cluster"]["nodes"]
      for node in nodes:
          print(f"{node['hostname']}: {node['gpus']} GPUs")
      ```

    exercises:
      - id: "foundations-python-q1"
        title: "subprocess Quiz"
        description: "What argument to subprocess.run captures both stdout and stderr?"
        exercise_type: "quiz"
        difficulty: 1
        options:
          - "output=True"
          - "capture_output=True"
          - "pipe=True"
          - "verbose=True"
        correct_answer: "capture_output=True"
        hints:
          - "This is a convenience argument equivalent to stdout=PIPE, stderr=PIPE"
        solution: "capture_output=True"

      - id: "foundations-python-code1"
        title: "GPU Inventory Script"
        description: "Write a Python script that uses subprocess to call nvidia-smi, parses the output to extract GPU names and memory, and prints a formatted table."
        exercise_type: "coding"
        difficulty: 3
        hints:
          - "Use subprocess.run with capture_output=True"
          - "nvidia-smi --query-gpu=name,memory.total --format=csv,noheader gives clean output"
          - "Split each line by comma to get name and memory"
        solution: |
          import subprocess
          result = subprocess.run(
              ["nvidia-smi", "--query-gpu=name,memory.total", "--format=csv,noheader"],
              capture_output=True, text=True
          )
          for i, line in enumerate(result.stdout.strip().split("\n")):
              name, mem = line.split(",")
              print(f"GPU {i}: {name.strip()} ({mem.strip()})")

      - id: "foundations-python-code2"
        title: "Config File Generator"
        description: "Write a Python function that takes a cluster name, node count, and GPUs per node, and generates a YAML config file."
        exercise_type: "coding"
        difficulty: 2
        hints:
          - "Use yaml.dump() to write YAML"
          - "Build a dictionary structure first, then serialize"
        solution: |
          import yaml
          def generate_config(cluster_name, node_count, gpus_per_node, output_path):
              config = {
                  "cluster": {
                      "name": cluster_name,
                      "nodes": [
                          {"hostname": f"node-{i:03d}", "gpus": gpus_per_node}
                          for i in range(node_count)
                      ]
                  }
              }
              with open(output_path, "w") as f:
                  yaml.dump(config, f, default_flow_style=False)

  - id: "networking-fundamentals"
    title: "Networking Fundamentals"
    order: 3
    objectives:
      - "Understand TCP/IP, DNS, and how data travels across networks"
      - "Use SSH for secure remote access and tunneling"
      - "Debug network issues with standard tools"
    content_md: |
      # Networking Fundamentals

      AI platform engineers must understand networking because distributed training, data pipelines, and cluster management all depend on reliable, fast networks.

      ## The TCP/IP Model

      ```
      ┌──────────────────────┐
      │   Application Layer  │  HTTP, SSH, DNS, NCCL
      ├──────────────────────┤
      │   Transport Layer    │  TCP (reliable), UDP (fast)
      ├──────────────────────┤
      │   Network Layer      │  IP addressing, routing
      ├──────────────────────┤
      │   Link Layer         │  Ethernet, InfiniBand, WiFi
      └──────────────────────┘
      ```

      ## SSH — Your Remote Access Lifeline

      ```bash
      # Basic connection
      ssh user@cluster.example.com

      # With key-based auth (recommended)
      ssh -i ~/.ssh/id_ed25519 user@cluster

      # SSH config file (~/.ssh/config) — saves typing
      Host hpc
          HostName cluster.example.com
          User myuser
          IdentityFile ~/.ssh/id_ed25519
          ForwardAgent yes

      # Now just: ssh hpc

      # Port forwarding (access remote Jupyter on local port)
      ssh -L 8888:localhost:8888 hpc

      # SSH tunnel for TensorBoard
      ssh -L 6006:localhost:6006 hpc
      ```

      ## Network Debugging Tools

      ```bash
      ping host              # Test connectivity
      traceroute host        # Trace the route packets take
      curl -v http://host    # Test HTTP endpoints
      netstat -tlnp          # Show listening ports
      ss -tlnp               # Modern alternative to netstat
      nslookup hostname      # DNS lookup
      dig hostname           # Detailed DNS query
      ip addr show           # Show network interfaces
      iperf3 -s / -c host   # Network bandwidth test
      ```

      ## InfiniBand — HPC's Secret Weapon

      Standard Ethernet tops out at 25-100 Gbps. InfiniBand provides:
      - **200-400 Gbps** bandwidth
      - **Sub-microsecond** latency
      - **RDMA** (Remote Direct Memory Access) — bypass the kernel for GPU-to-GPU transfers

      ```bash
      # Check InfiniBand status
      ibstat
      ibstatus

      # Bandwidth test
      ib_write_bw -d mlx5_0 --report_gbits
      ```

