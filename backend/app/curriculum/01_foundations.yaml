              Returns:
                  List of dicts with keys:
                    - "epoch": int
                    - "total_epochs": int
                    - "loss": float
                    - "accuracy": float
                    - "lr": float
              Only include lines that match the epoch metric format.
              """
              # YOUR CODE HERE
              pass
        test_cases:
          - label: "Test 1: Parse three epochs"
            input: |
              Loading model...
              Starting training
              Epoch 1/10 - loss: 1.5432 - accuracy: 0.3210 - lr: 0.001
              Epoch 2/10 - loss: 0.9876 - accuracy: 0.5670 - lr: 0.001
              Epoch 3/10 - loss: 0.5432 - accuracy: 0.7890 - lr: 0.0005
              Saving checkpoint...
            expected_output: '[{"epoch": 1, "total_epochs": 10, "loss": 1.5432, "accuracy": 0.321, "lr": 0.001}, {"epoch": 2, "total_epochs": 10, "loss": 0.9876, "accuracy": 0.567, "lr": 0.001}, {"epoch": 3, "total_epochs": 10, "loss": 0.5432, "accuracy": 0.789, "lr": 0.0005}]'
          - label: "Test 2: No metric lines"
            input: |
              Loading model...
              Done.
            expected_output: "[]"
          - label: "Test 3: Single epoch"
            input: "Epoch 1/1 - loss: 0.1000 - accuracy: 0.9500 - lr: 0.0001"
            expected_output: '[{"epoch": 1, "total_epochs": 1, "loss": 0.1, "accuracy": 0.95, "lr": 0.0001}]'
            hidden: true
        hints:
          - "Use a regex pattern like r'Epoch (\\d+)/(\\d+) - loss: ([\\d.]+) - accuracy: ([\\d.]+) - lr: ([\\d.]+)'"
          - "re.findall or re.finditer will extract all matches"
          - "Convert captured groups to int/float as appropriate"
        solution: |
          import re

          def parse_training_log(log_text: str) -> list[dict]:
              pattern = r'Epoch (\d+)/(\d+) - loss: ([\d.]+) - accuracy: ([\d.]+) - lr: ([\d.]+)'
              results = []
              for match in re.finditer(pattern, log_text):
                  results.append({
                      "epoch": int(match.group(1)),
                      "total_epochs": int(match.group(2)),
                      "loss": float(match.group(3)),
                      "accuracy": float(match.group(4)),
                      "lr": float(match.group(5)),
                  })
              return results

      - id: "foundations-shell-code3"
        title: "Scratch Space Cleanup Script"
        description: |
          Write a Python function that simulates an HPC scratch cleanup tool.
          Given a list of file records (dicts with path, size_mb, and
          last_modified as a datetime), return a cleanup plan: which files to
          delete (older than a given number of days), how much space would be
          freed, and which files to keep.
        exercise_type: "coding"
        difficulty: 3
        starter_code: |
          from datetime import datetime, timedelta

          def plan_cleanup(
              files: list[dict],
              max_age_days: int = 30,
              now: datetime = None
          ) -> dict:
              """
              Plan a scratch space cleanup.

              Args:
                  files: List of dicts with keys:
                      - "path": str
                      - "size_mb": float
                      - "last_modified": datetime
                  max_age_days: Files older than this will be marked for deletion
                  now: Current time (for testing). Defaults to datetime.now().

              Returns:
                  dict with keys:
                    - "to_delete": list of file paths to delete
                    - "to_keep": list of file paths to keep
                    - "space_freed_mb": float (total size of files to delete)
                    - "space_kept_mb": float (total size of files to keep)
              """
              # YOUR CODE HERE
              pass
        test_cases:
          - label: "Test 1: Mix of old and new files"
            input: '{"files": [{"path": "/scratch/old.pt", "size_mb": 500, "last_modified": "2024-01-01"}, {"path": "/scratch/new.pt", "size_mb": 200, "last_modified": "2024-06-01"}], "max_age_days": 30, "now": "2024-06-15"}'
            expected_output: '{"to_delete": ["/scratch/old.pt"], "to_keep": ["/scratch/new.pt"], "space_freed_mb": 500, "space_kept_mb": 200}'
          - label: "Test 2: All files are recent"
            input: '{"files": [{"path": "/scratch/a.dat", "size_mb": 100, "last_modified": "2024-06-10"}], "max_age_days": 30, "now": "2024-06-15"}'
            expected_output: '{"to_delete": [], "to_keep": ["/scratch/a.dat"], "space_freed_mb": 0, "space_kept_mb": 100}'
          - label: "Test 3: All files are old"
            input: '{"files": [{"path": "/scratch/x.bin", "size_mb": 1000, "last_modified": "2024-01-01"}, {"path": "/scratch/y.bin", "size_mb": 2000, "last_modified": "2024-02-01"}], "max_age_days": 30, "now": "2024-06-15"}'
            expected_output: '{"to_delete": ["/scratch/x.bin", "/scratch/y.bin"], "to_keep": [], "space_freed_mb": 3000, "space_kept_mb": 0}'
            hidden: true
        hints:
          - "Calculate the cutoff date: now - timedelta(days=max_age_days)"
          - "Compare each file's last_modified against the cutoff"
          - "Sum sizes separately for delete and keep lists"
        solution: |
          from datetime import datetime, timedelta

          def plan_cleanup(
              files: list[dict],
              max_age_days: int = 30,
              now: datetime = None
          ) -> dict:
              if now is None:
                  now = datetime.now()
              cutoff = now - timedelta(days=max_age_days)

              to_delete = []
              to_keep = []
              space_freed = 0.0
              space_kept = 0.0

              for f in files:
                  if f["last_modified"] < cutoff:
                      to_delete.append(f["path"])
                      space_freed += f["size_mb"]
                  else:
                      to_keep.append(f["path"])
                      space_kept += f["size_mb"]

              return {
                  "to_delete": to_delete,
                  "to_keep": to_keep,
                  "space_freed_mb": space_freed,
                  "space_kept_mb": space_kept,
              }

      - id: "foundations-shell-lab1"
        title: "Shell Scripting Automation Lab"
        description: |
          **Guided Lab: Building a Complete HPC Job Wrapper Script**

          In this lab, you will write a bash script that wraps a training
          command with proper logging, error handling, and cleanup.

          **Step 1 — Script skeleton**
          1. Create a file `job_wrapper.sh` starting with:
             ```bash
             #!/bin/bash
             set -euo pipefail
             ```
          2. Add a `cleanup` function and a `trap cleanup EXIT`.
          3. Create a temporary directory with `mktemp -d`.

          **Step 2 — Add logging functions**
          1. Write `log_info()` and `log_error()` functions that include timestamps.
          2. Format: `[2024-06-01 12:00:00] [INFO] Your message here`
          3. Direct error messages to stderr with `>&2`.

          **Step 3 — Parse command-line arguments**
          1. Accept `--job-name`, `--epochs`, and `--output-dir` as arguments.
          2. Use a `while` loop with a `case` statement to parse them.
          3. Provide default values for any unset arguments.

          **Step 4 — Add the main logic**
          1. Create the output directory: `mkdir -p "$OUTPUT_DIR"`.
          2. Log the start time and parameters.
          3. Run the training command (simulated): `echo "Training for $EPOCHS epochs..."`.
          4. Log the end time and calculate elapsed time.

          **Step 5 — Test your script**
          1. `chmod +x job_wrapper.sh`
          2. `./job_wrapper.sh --job-name test --epochs 10 --output-dir /tmp/results`
          3. Test error handling: call a command that fails and verify cleanup runs.
          4. Test with missing arguments and verify defaults are used.
        exercise_type: "lab"
        difficulty: 4
        hints:
          - "Use `date +%s` at the start and end to calculate elapsed seconds"
          - "For argument parsing, the `case` pattern handles --flag=value and --flag value forms"
          - "Test cleanup by adding `false` (always fails) somewhere in the script"
        solution: |
          #!/bin/bash
          set -euo pipefail

          TMPDIR=$(mktemp -d)
          JOB_NAME="${JOB_NAME:-unnamed}"
          EPOCHS="${EPOCHS:-100}"
          OUTPUT_DIR="${OUTPUT_DIR:-/tmp/output}"

          log_info() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] [INFO] $*"; }
          log_error() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] [ERROR] $*" >&2; }

          cleanup() {
              log_info "Cleaning up $TMPDIR"
              rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          # Parse arguments
          while [[ $# -gt 0 ]]; do
              case "$1" in
                  --job-name) JOB_NAME="$2"; shift 2 ;;
                  --epochs) EPOCHS="$2"; shift 2 ;;
                  --output-dir) OUTPUT_DIR="$2"; shift 2 ;;
                  *) log_error "Unknown argument: $1"; exit 1 ;;
              esac
          done

          mkdir -p "$OUTPUT_DIR"
          START=$(date +%s)
          log_info "Starting job: $JOB_NAME (epochs=$EPOCHS, output=$OUTPUT_DIR)"

          # Simulated training
          for ((e=1; e<=EPOCHS; e++)); do
              echo "Epoch $e/$EPOCHS - loss: 0.$((RANDOM % 1000))"
              sleep 0.1
          done > "$OUTPUT_DIR/training.log"

          END=$(date +%s)
          ELAPSED=$((END - START))
          log_info "Job completed in ${ELAPSED}s. Output: $OUTPUT_DIR"
