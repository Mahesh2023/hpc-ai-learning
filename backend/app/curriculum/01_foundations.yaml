      - id: "foundations-python-code2"
        title: "Parallel File Processor"
        description: |
          Write a function that takes a list of file paths and a processing
          function, and applies the function to each file in parallel using
          multiprocessing.Pool.  Return a list of results in the same order
          as the input files.  If any file raises an exception, include None
          for that file in the result list.
        exercise_type: "coding"
        difficulty: 3
        starter_code: |
          from multiprocessing import Pool
          from typing import Callable, Any

          def parallel_process(
              files: list[str],
              func: Callable[[str], Any],
              num_workers: int = 4
          ) -> list[Any]:
              """
              Apply func to each file in parallel using num_workers processes.
              Return results in the same order as files.
              If a file raises an exception, use None as the result.
              """
              # YOUR CODE HERE
              pass
        test_cases:
          - label: "Test 1: Process 3 files with a simple function"
            input: '{"files": ["/tmp/a.txt", "/tmp/b.txt", "/tmp/c.txt"], "func": "line_count", "num_workers": 2}'
            expected_output: "[10, 20, 15]"
          - label: "Test 2: Handle a missing file gracefully"
            input: '{"files": ["/tmp/exists.txt", "/tmp/missing.txt"], "func": "line_count", "num_workers": 2}'
            expected_output: "[10, null]"
          - label: "Test 3: Empty file list"
            input: '{"files": [], "func": "line_count", "num_workers": 2}'
            expected_output: "[]"
            hidden: true
        hints:
          - "Pool.map preserves the order of results"
          - "Wrap the function call in a try/except to handle errors gracefully"
          - "You may need a wrapper function that catches exceptions and returns None"
        solution: |
          from multiprocessing import Pool
          from typing import Callable, Any

          def _safe_apply(args):
              func, filepath = args
              try:
                  return func(filepath)
              except Exception:
                  return None

          def parallel_process(
              files: list[str],
              func: Callable[[str], Any],
              num_workers: int = 4
          ) -> list[Any]:
              if not files:
                  return []
              args = [(func, f) for f in files]
              with Pool(processes=num_workers) as pool:
                  results = pool.map(_safe_apply, args)
              return results

