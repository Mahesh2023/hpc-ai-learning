      - id: "foundations-linux-code1"
        title: "Large File Finder Script"
        description: |
          Write a Python script that mimics a common HPC admin task: find all files
          larger than a given size threshold (in MB) under a directory tree.
          The function should return a list of tuples (filepath, size_in_mb) sorted
          by size descending.
        exercise_type: "coding"
        difficulty: 3
        starter_code: |
          import os

          def find_large_files(directory: str, min_size_mb: float) -> list[tuple[str, float]]:
              """
              Find all files >= min_size_mb under directory.
              Return list of (filepath, size_in_mb) sorted by size descending.
              """
              # YOUR CODE HERE
              pass
        test_cases:
          - label: "Test 1: Basic directory scan"
            input: '{"directory": "/tmp/test_files", "min_size_mb": 10}'
            expected_output: '[("/tmp/test_files/big.dat", 50.0), ("/tmp/test_files/medium.bin", 15.5)]'
          - label: "Test 2: No files match threshold"
            input: '{"directory": "/tmp/small_files", "min_size_mb": 100}'
            expected_output: "[]"
          - label: "Test 3: Nested directory search"
            input: '{"directory": "/tmp/nested", "min_size_mb": 1}'
            expected_output: '[("/tmp/nested/sub/deep/data.h5", 200.0), ("/tmp/nested/output.csv", 5.0)]'
            hidden: true
        hints:
          - "Use os.walk() to traverse the directory tree"
          - "os.path.getsize() returns size in bytes — divide by 1024*1024 for MB"
          - "Remember to sort with reverse=True"
        solution: |
          import os

          def find_large_files(directory: str, min_size_mb: float) -> list[tuple[str, float]]:
              results = []
              for root, dirs, files in os.walk(directory):
                  for fname in files:
                      fpath = os.path.join(root, fname)
                      try:
                          size_bytes = os.path.getsize(fpath)
                          size_mb = round(size_bytes / (1024 * 1024), 1)
                          if size_mb >= min_size_mb:
                              results.append((fpath, size_mb))
                      except OSError:
                          continue
              results.sort(key=lambda x: x[1], reverse=True)
              return results

      - id: "foundations-linux-code2"
        title: "Log Analysis Script"
        description: |
          Write a Python function that parses an Nginx-style access log and returns
          the top N IP addresses by request count.  Each line of the log has the
          format:
            IP_ADDRESS - - [timestamp] "METHOD /path HTTP/1.1" STATUS SIZE
          Example:
            192.168.1.10 - - [01/Jun/2024:10:00:00 +0000] "GET /index.html HTTP/1.1" 200 1024
        exercise_type: "coding"
        difficulty: 3
        starter_code: |
          def top_ips(log_text: str, n: int = 5) -> list[tuple[str, int]]:
              """
              Parse log_text (multi-line string) and return the top n IPs
              as a list of (ip_address, count) sorted by count descending.
              """
              # YOUR CODE HERE
              pass
        test_cases:
          - label: "Test 1: Simple log with three IPs"
            input: |
              192.168.1.1 - - [01/Jun/2024:10:00:00 +0000] "GET / HTTP/1.1" 200 512
              192.168.1.2 - - [01/Jun/2024:10:00:01 +0000] "GET / HTTP/1.1" 200 512
              192.168.1.1 - - [01/Jun/2024:10:00:02 +0000] "GET /page HTTP/1.1" 200 1024
              192.168.1.1 - - [01/Jun/2024:10:00:03 +0000] "POST /api HTTP/1.1" 201 256
              192.168.1.3 - - [01/Jun/2024:10:00:04 +0000] "GET / HTTP/1.1" 200 512
            expected_output: '[("192.168.1.1", 3), ("192.168.1.2", 1), ("192.168.1.3", 1)]'
          - label: "Test 2: Empty log"
            input: ""
            expected_output: "[]"
          - label: "Test 3: Top 1 only"
            input: |
              10.0.0.1 - - [01/Jun/2024:10:00:00 +0000] "GET / HTTP/1.1" 200 512
              10.0.0.2 - - [01/Jun/2024:10:00:01 +0000] "GET / HTTP/1.1" 200 512
              10.0.0.1 - - [01/Jun/2024:10:00:02 +0000] "GET / HTTP/1.1" 200 512
            expected_output: '[("10.0.0.1", 2)]'
            hidden: true
        hints:
          - "Split each line on whitespace; the IP is the first token"
          - "Use a dictionary or collections.Counter to count occurrences"
          - "Sort by count descending, then slice [:n]"
        solution: |
          from collections import Counter

          def top_ips(log_text: str, n: int = 5) -> list[tuple[str, int]]:
              if not log_text.strip():
                  return []
              ips = []
              for line in log_text.strip().split("\n"):
                  parts = line.split()
                  if parts:
                      ips.append(parts[0])
              counts = Counter(ips)
              return counts.most_common(n)

      - id: "foundations-linux-lab1"
        title: "HPC Filesystem Exploration Lab"
        description: |
          **Guided Lab: Navigating an HPC Filesystem**

          In this lab you will practice essential Linux commands in a simulated
          HPC environment.

          **Step 1 — Orient yourself**
          1. Run `pwd` to see your current directory.
          2. Run `ls -la` to list all files including hidden ones.
          3. Run `echo $HOME` and `echo $SCRATCH` to see your environment variables.

          **Step 2 — Create a project structure**
          1. `mkdir -p /scratch/$USER/experiment_001/{data,logs,checkpoints}`
          2. Verify with `tree /scratch/$USER/experiment_001`
          3. Create a placeholder: `touch /scratch/$USER/experiment_001/data/README.md`

          **Step 3 — Set permissions for team sharing**
          1. `chmod 770 /scratch/$USER/experiment_001/`
          2. `chmod -R g+rX /scratch/$USER/experiment_001/`
          3. Verify with `ls -la /scratch/$USER/experiment_001/`

          **Step 4 — Build a pipeline**
          1. Create a sample log: `for i in $(seq 1 100); do echo "$(date) INFO Request $i processed" >> /tmp/app.log; done`
          2. Add some errors: `echo "$(date) ERROR Connection timeout" >> /tmp/app.log`
          3. Use `grep`, `sort`, and `uniq -c` to count log levels.

          **Step 5 — Process management**
          1. Start a background process: `sleep 300 &`
          2. List it with `jobs` and `ps aux | grep sleep`
          3. Kill it with `kill %1`
        exercise_type: "lab"
        difficulty: 2
        hints:
          - "Use tab completion to speed up typing paths"
          - "If you make a mistake, `rm -rf` and start over — it is scratch space"
        solution: |
          # Step 1
          pwd
          ls -la
          echo $HOME && echo $SCRATCH

          # Step 2
          mkdir -p /scratch/$USER/experiment_001/{data,logs,checkpoints}
          tree /scratch/$USER/experiment_001
          touch /scratch/$USER/experiment_001/data/README.md

          # Step 3
          chmod 770 /scratch/$USER/experiment_001/
          chmod -R g+rX /scratch/$USER/experiment_001/
          ls -la /scratch/$USER/experiment_001/

          # Step 4
          for i in $(seq 1 100); do echo "$(date) INFO Request $i processed" >> /tmp/app.log; done
          for i in $(seq 1 5); do echo "$(date) ERROR Connection timeout" >> /tmp/app.log; done
          awk '{print $4}' /tmp/app.log | sort | uniq -c | sort -rn

          # Step 5
          sleep 300 &
          jobs
          ps aux | grep sleep
          kill %1

